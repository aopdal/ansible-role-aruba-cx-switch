[pytest]
# Pytest configuration for filter plugin unit tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests/unit

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Coverage options
[coverage:run]
source = filter_plugins
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests
    slow: Tests that take a long time to run
    vlan: Tests for VLAN filters
    vrf: Tests for VRF filters
    interface: Tests for interface filters
    ospf: Tests for OSPF filters
    comparison: Tests for comparison functions
