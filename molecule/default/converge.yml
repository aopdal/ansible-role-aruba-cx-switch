---
# Converge playbook for Molecule testing
- name: Converge
  hosts: all
  gather_facts: false  # Disabled to avoid network fact gathering issues

  vars:
    # Mock NetBox connection
    netbox_url: "http://localhost:8000"
    netbox_token: "mock_token_for_testing"

    # Mock device data
    device_id: 1
    # ansible_network_os removed to avoid network fact gathering

    # Mock custom fields
    custom_fields:
      device_evpn: false
      device_vxlan: false
      device_ospf_1_routerid: "10.0.0.1"

    # Test VRFs
    netbox_vrfs:
      - name: "MGMT"
        rd: "65000:100"
        route_targets:
          - "65000:100"

    # Mock VRFs list for filters
    vrfs:
      - name: "MGMT"
        rd: "65000:100"

    # Test interfaces
    interfaces:
      - name: "1/1/1"
        type:
          value: "1000base-t"
        mode: "access"
        untagged_vlan:
          vid: 100
        enabled: true
        ip_addresses: []
        custom_fields: {}
      - name: "1/1/2"
        type:
          value: "1000base-t"
        mode: "trunk"
        tagged_vlans:
          - vid: 100
          - vid: 200
        enabled: true
        ip_addresses: []
        custom_fields: {}

    # Test VLANs
    vlans:
      - id: 100
        vid: 100
        name: "DATA"
      - id: 200
        vid: 200
        name: "VOICE"

    # Mock IP addresses
    ip_addresses: []

    # Mock config context
    config_context: {}

    # Enable features for testing - all disabled for Molecule testing
    aoscx_gather_facts: false  # Skip fact gathering in tests
    aoscx_use_rest_api_facts: false  # REST API fact gathering disabled in tests
    aoscx_gather_enhanced_facts: false  # Enhanced facts disabled in tests

    # REST API version settings (for reference, not used in tests)
    ansible_aoscx_rest_version: 10.09  # pyaoscx max version
    aoscx_rest_api_version: "10.17"  # Direct REST API version
    aoscx_configure_banner: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_ntp: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_timezone: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_dns: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_vrfs: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_vlans: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_physical_interfaces: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_lag_interfaces: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_mclag_interfaces: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_l2_interfaces: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_l3_interfaces: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_loopback: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_evpn: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_vxlan: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_ospf: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_bgp: false  # Disabled - no AOS-CX modules in test env
    aoscx_configure_vsx: false  # Disabled - no AOS-CX modules in test env
    aoscx_save_config: false
    aoscx_debug: true

  roles:
    - role: aopdal.aruba_cx_switch
