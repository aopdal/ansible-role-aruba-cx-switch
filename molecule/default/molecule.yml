---
# Molecule configuration for testing the role
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
  enabled: false

driver:
  name: docker

platforms:
  - name: instance
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      callback_whitelist: profile_tasks, timer
      stdout_callback: debug
      roles_path: "${MOLECULE_PROJECT_DIRECTORY}/../..:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles"
    ssh_connection:
      pipelining: false
  inventory:
    host_vars:
      instance:
        ansible_user: root
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
