---
site_name: Aruba CX Switch Ansible Role
site_description: Production-ready Ansible role for managing Aruba CX switches with NetBox integration
site_author: aopdal
# site_url: https://aopdal.github.io/ansible-role-aruba-cx-switch  # Uncomment when repo is public
site_url: ""

repo_name: aopdal/ansible-role-aruba-cx-switch
repo_url: https://github.com/aopdal/ansible-role-aruba-cx-switch
edit_uri: edit/main/docs/

# Documentation directory
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: QUICKSTART.md
      - Requirements: REQUIREMENTS.md
      - Development: DEVELOPMENT.md
  - Architecture:
      - Automation Ecosystem: AUTOMATION_ECOSYSTEM.md
      - Visual Reference: AUTOMATION_ECOSYSTEM_DIAGRAMS.md
  - NetBox Integration:
      - Integration Reference: NETBOX_INTEGRATION.md
      - Filter Plugins:
          - Overview: FILTER_PLUGINS.md
          - Detailed Reference: filter_plugins/index.md
          - Utils Module: filter_plugins/utils.md
          - VLAN Filters: filter_plugins/vlan_filters.md
          - VRF Filters: filter_plugins/vrf_filters.md
          - Interface Filters: filter_plugins/interface_filters.md
          - Comparison Module: filter_plugins/comparison.md
          - OSPF Filters: filter_plugins/ospf_filters.md
  - Configuration:
      - Base System:
          - Overview: BASE_CONFIGURATION.md
          - DNS: DNS_CONFIGURATION.md
      - ZTP (Zero Touch Provisioning): ZTP_CONFIGURATION.md
      - VLAN Management:
          - Workflow Overview: VLAN_CHANGE_IDENTIFICATION_WORKFLOW.md
          - Visual Diagrams: VLAN_WORKFLOW_DIAGRAMS.md
          - Developer Guide: VLAN_DEVELOPER_GUIDE.md
      - EVPN & VXLAN:
          - Overview: EVPN_VXLAN_CONFIGURATION.md
          - Configuration Modes: EVPN_VXLAN_MODES.md
          - Cleanup Process: EVPN_VXLAN_CLEANUP_SUMMARY.md
          - Idempotent Mode: EVPN_VXLAN_IDEMPOTENT_MODE.md
          - Summary: EVPN_VXLAN_SUMMARY.md
      - BGP:
          - Hybrid Configuration: BGP_HYBRID_CONFIGURATION.md
          - NetBox BGP Plugin: NETBOX_BGP_PLUGIN.md
          - Migration Guide: BGP_MIGRATION_GUIDE.md
          - Summary: BGP_HYBRID_SUMMARY.md
          - BGP Configuration: BGP_CONFIGURATION.md
          - EVPN Fabric Example: BGP_EVPN_FABRIC_EXAMPLE.md
  - Testing & Development:
      - Testing Guide: TESTING.md
      - Quick Start: TESTING_QUICK_START.md
      - Environment: TESTING_ENVIRONMENT.md
      - Contributing: CONTRIBUTING.md
  - Reference:
      - Quick Reference: QUICK_REFERENCE.md
      - Documentation Site: DOCUMENTATION_SITE.md  # How to use MkDocs
      - Documentation Sync: DOCS_SYNC_WORKFLOW.md  # How README.md syncs to docs/
      - Workspace Setup: WORKSPACE.md
      - DevContainer Setup: DEVCONTAINER_SETUP.md
      - DevContainer Mounts: DEVCONTAINER_MOUNTS.md
      - Changelog: CHANGELOG.md
  - Internal:
      - VLAN Refactoring:
          - Summary: REFACTOR_SUMMARY.md
          - Complete Overview: COMPLETE_SUMMARY.md
          - Documentation Integration: DOCUMENTATION_INTEGRATION.md
          - Verification Checklist: VERIFICATION_CHECKLIST.md
      - Historical: REFACTORING_SUMMARY.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aopdal
  # version:
  #   provider: mike  # Uncomment when you want to use multi-version docs

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
