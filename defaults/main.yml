---
# Default variables for aruba_cx_switch role

# REST API version for pyaoscx modules (aoscx_facts, aoscx_vlan, etc.)
# pyaoscx library supports up to v10.09 - DO NOT CHANGE unless pyaoscx is updated
# For direct REST API calls (enhanced facts), use aoscx_rest_api_version instead
ansible_aoscx_rest_version: 10.09

# Enable/disable fact gathering
aoscx_gather_facts: true

# Enable debug output
aoscx_debug: false

# Configuration options
aoscx_configure_hostname: true
aoscx_configure_banner: true
aoscx_configure_ntp: true
aoscx_configure_timezone: true
aoscx_configure_dns: true
aoscx_generate_template_config: false
aoscx_configure_vrfs: true
aoscx_configure_vlans: true
aoscx_configure_physical_interfaces: true
aoscx_configure_lag_interfaces: true
aoscx_configure_mclag_interfaces: true
aoscx_configure_l2_interfaces: true
aoscx_configure_l3_interfaces: true
aoscx_configure_evpn: false
aoscx_configure_vxlan: false
aoscx_configure_ospf: true
aoscx_configure_bgp: false
aoscx_configure_vsx: false

# Configure ssh server vrf default and https-server vrf default on access-switch
# devices. These services are always enabled on the mgmt VRF; this adds the
# default VRF so that in-band management and REST API calls work for devices
# whose device_roles contains 'access-switch'.
aoscx_configure_access_switch_server_vrfs: true

# Configure ip route 0.0.0.0/0 (default gateway) on access-switch devices.
# The gateway is derived from the device's primary_ip4 (set by the NetBox
# inventory plugin): the first usable host in the same subnet. Skipped when
# device_roles does not contain 'access-switch' or primary_ip4 is undefined.
aoscx_configure_access_switch_default_gateway: true

# Port-access / device-profile feature.
# Renders port-access lldp-groups, mac-groups, roles and device-profiles
# from the `port_access` config_context dict (NetBox). Auto-skipped when
# the device has no `port_access` key in its config_context, so this can
# stay enabled globally.
aoscx_configure_port_access: true

# Idempotency mode - when true, removes configs not in NetBox
aoscx_idempotent_mode: false

# Configure ALL VLANs available for the device from NetBox, regardless of
# whether they are currently used by an interface or port-access role.
# When true:
#   - Skips the "VLANs in use on interfaces" detection
#   - Treats every VLAN returned by NetBox for this device as "in use"
#   - All NetBox-scoped VLANs are created on the device
#   - All NetBox-scoped VLANs are protected from idempotent cleanup
# When false (default):
#   - Only VLANs referenced by an interface (untagged/tagged) or by a
#     port-access role are created; the rest can be cleaned up in
#     idempotent mode.
# Useful for access/edge switches where the catalog of VLANs scoped to the
# device should always exist regardless of current interface usage.
aoscx_configure_vlans_all: false

# Configure STP (Spanning Tree Protocol) settings.
# When true:
#   - Global MSTP settings are applied from config_context (mstp_config_name,
#     mstp_priority, mstp_config_revision) when mstp_config_name is defined.
#   - Per-interface STP settings are applied for L2 interfaces that have one or
#     more of the following NetBox custom fields set:
#     if_stp_bpdu_filter, if_stp_bpdu_guard, if_stp_edge_port, if_stp_root_guard
#   - stp_config is included in the REST API interface attribute query
#     (aoscx_gather_facts_rest_api: true) for change detection.
aoscx_configure_stp: true

# Force L2 interface configuration - bypasses change detection
# When true: Configures ALL L2 interfaces from NetBox regardless of current state
# Useful for:
#   - Mode changes (native-untagged <-> native-tagged) that detection may miss
#   - Troubleshooting idempotency issues
#   - Ensuring configuration matches NetBox exactly
# Default: false (use change detection for efficiency)
aoscx_force_l2_config: false

# DEPRECATED: aoscx_fast_mode has no effect and will be removed in a future version.
# It caused more API calls (not fewer) due to absent device state for change detection.
# For faster fact gathering, use aoscx_gather_facts_rest_api: true instead.
aoscx_fast_mode: false

# NetBox BGP plugin settings
# Select which NetBox BGP plugin to query.
#   "netbox-bgp"     : legacy plugin (/api/plugins/bgp/)  — default for existing installs
#   "netbox-routing" : newer plugin  (/api/plugins/routing/bgp/) — replaces netbox-bgp
aoscx_bgp_plugin: "netbox-bgp"
aoscx_use_netbox_bgp_plugin: true # Set false to disable BGP configuration entirely (both plugins)
aoscx_netbox_validate_certs: true # Validate SSL certificates when querying NetBox API
aoscx_no_log: true # Set to false to show sensitive data in logs (not recommended)

# Save configuration after changes
aoscx_save_config: true

# Connection settings
aoscx_connection_type: network_cli # or httpapi

# REST API-based fact gathering (v10.15+ recommended)
# When true, uses direct REST API calls (gather_facts_rest_api.yml) instead of aoscx_facts module
# Benefits:
#   - 3-5x faster fact gathering (single authenticated session)
#   - IPv6 addresses included (not just URI references)
#   - VSX virtual IPs for anycast/active-gateway
#   - EVPN/VXLAN facts in same session
# Requirements:
#   - aoscx_rest_api_version: "10.15" or later
#   - REST API credentials (defaults to ansible_user/ansible_password)
aoscx_gather_facts_rest_api: false

# REST API credentials for enhanced fact gathering (delegated to localhost)
# These default to ansible_host/ansible_user/ansible_password if not set
# aoscx_rest_host: "{{ ansible_host }}"        # Switch management IP/hostname
# aoscx_rest_user: "{{ ansible_user }}"        # REST API username
# aoscx_rest_password: "{{ ansible_password }}"  # REST API password
aoscx_rest_validate_certs: false # Validate SSL certificates for REST API

# Directory for generated template configuration files
aoscx_template_config_output_dir: "/tmp"

# REST API version for direct REST API calls (enhanced facts, REST API fact gathering)
# This is SEPARATE from ansible_aoscx_rest_version (which is for pyaoscx modules)
# Direct REST API calls require v10.15+ for proper ip6_addresses expansion with depth=2
# Auto-detection via /rest/v1/firmware may require authentication.
# Set this to match your switch firmware version:
aoscx_rest_api_version: "10.15" # Minimum for IPv6 expansion; 10.15, 10.17 tested

# L3 interface settings
aoscx_l3_counters_enable: true # Enable l3-counters on L3 interfaces

# Built-in VRFs (system VRFs that should be treated as default)
# These VRFs are considered equivalent to the default VRF for configuration purposes
aoscx_builtin_vrfs:
  - default
  - Default
  - Global
  - global
  - mgmt
  - MGMT
  - "" # Empty string is also treated as default VRF
