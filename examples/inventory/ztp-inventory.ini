# Example inventory for ZTP configuration generation
# This inventory demonstrates how to organize switches for ZTP deployment

[aruba_switches]
# For ZTP generation, ansible_host represents the planned management IP
# These devices may not exist yet, so we use connection: local
sw01-lab ansible_host=192.168.1.101 mgmt_gateway=192.168.1.1 mgmt_dns=8.8.8.8
sw02-lab ansible_host=192.168.1.102 mgmt_gateway=192.168.1.1 mgmt_dns=8.8.8.8
sw03-prod ansible_host=10.1.1.51 mgmt_gateway=10.1.1.1 mgmt_dns=10.1.1.53
sw04-prod ansible_host=10.1.1.52 mgmt_gateway=10.1.1.1 mgmt_dns=10.1.1.53

[new_switches]
# New switches that need ZTP configs generated (devices don't exist yet)
sw05-new ansible_host=192.168.1.105 mgmt_gateway=192.168.1.1
sw06-new ansible_host=192.168.1.106 mgmt_gateway=192.168.1.1

[lab_switches]
sw01-lab
sw02-lab
sw05-new
sw06-new

[production_switches]
sw03-prod
sw04-prod

[aruba_switches:vars]
# Common connection settings for existing switches
ansible_connection=ansible.netcommon.network_cli
ansible_network_os=arubanetworks.aoscx.aoscx
ansible_user=netops
ansible_password="{{ vault_ansible_password }}"

# NetBox settings
netbox_url=https://netbox.example.com
netbox_token="{{ vault_netbox_token }}"

[new_switches:vars]
# Settings for new switches (ZTP generation only)
# These switches don't exist yet, so we skip connection
ansible_connection=local

# ZTP-specific settings
aoscx_ztp_admin_user=deploy
aoscx_ztp_admin_password="{{ vault_ztp_deploy_password }}"
aoscx_ztp_output_dir=./ztp_configs/new_deployment

[lab_switches:vars]
# Lab environment settings
aoscx_ztp_admin_password="{{ vault_lab_admin_password }}"

[production_switches:vars]
# Production environment settings
aoscx_ztp_admin_password="{{ vault_prod_admin_password }}"
aoscx_ztp_output_dir=./ztp_configs/production
