---
# Minimal Deployment Playbook
# This playbook demonstrates basic switch configuration using the ansible-role-aruba-cx-switch role

- name: Configure Aruba CX Switches - Minimal Deployment
  hosts: aruba_switches
  gather_facts: no

  tasks:
    - name: Apply base configuration to switches
      ansible.builtin.include_role:
        name: aopdal.aruba_cx_switch
      tags:
        - always
