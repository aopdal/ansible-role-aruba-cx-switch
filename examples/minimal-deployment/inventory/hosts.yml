---
# Minimal Deployment Inventory
# Define your switches here

all:
  children:
    aruba_switches:
      hosts:
        # Replace with your actual switch
        sw01:
          ansible_host: 192.168.1.10
          ansible_network_os: arubanetworks.aoscx.aoscx

          # Optional: Override per-host settings
          # ansible_user: admin
          # device_location: "Building A - IDF 1"

      vars:
        # Common connection settings
        ansible_connection: ansible.netcommon.network_cli
        ansible_user: netops
        ansible_password: "{{ vault_ansible_password }}"

        # Enable SSH host key checking in production
        # For lab environments, you can disable it
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
