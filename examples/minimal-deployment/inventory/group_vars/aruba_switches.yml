---
# Aruba Switch Configuration Variables
# This file contains role-specific configuration for all aruba_switches

# ============================================================================
# Feature Flags - Enable/Disable Configuration Sections
# ============================================================================

# Base system configuration
aoscx_configure_banner: true
aoscx_configure_timezone: true
aoscx_configure_ntp: true
aoscx_configure_dns: true

# VLAN and interface configuration
aoscx_configure_vrfs: true
aoscx_configure_vlans: true
aoscx_configure_physical_interfaces: true
aoscx_configure_l2_interfaces: true

# Advanced features (disabled for minimal deployment)
aoscx_configure_lag_interfaces: false
aoscx_configure_mclag_interfaces: false
aoscx_configure_l3_interfaces: false
aoscx_configure_loopback: false
aoscx_configure_evpn: false
aoscx_configure_vxlan: false

# Routing protocols (require explicit tags to run)
aoscx_configure_ospf: false
aoscx_configure_bgp: false
aoscx_configure_vsx: false

# ============================================================================
# Base Configuration Settings
# ============================================================================

# System Banner
aoscx_banner_text: |
  ************************************************************
  *                                                          *
  *  This system is for authorized use only.                *
  *  Activity may be monitored and logged.                  *
  *  Disconnect IMMEDIATELY if you are not an authorized    *
  *  user.                                                   *
  *                                                          *
  ************************************************************

# Timezone Configuration
aoscx_timezone: "America/New_York"

# NTP Configuration
aoscx_ntp_servers:
  - address: "time1.google.com"
    prefer: true
    iburst: true
  - address: "time2.google.com"
    iburst: true

# DNS Configuration (via config_context)
# Set these in NetBox config_context or define here
# aoscx_dns_domain_name: "example.com"
# aoscx_dns_name_servers:
#   - "8.8.8.8"
#   - "8.8.4.4"

# ============================================================================
# VLAN Configuration
# ============================================================================

# VLAN change workflow settings
aoscx_vlan_workflow_enabled: true

# Automatically remove VLANs not in NetBox (use with caution!)
aoscx_vlan_cleanup_enabled: false

# Dry run mode - report changes but don't apply them
aoscx_vlan_workflow_dry_run: false

# ============================================================================
# Interface Configuration
# ============================================================================

# Interface description management
aoscx_update_interface_descriptions: true

# Interface admin state management
aoscx_update_interface_admin_state: true

# ============================================================================
# NetBox Integration Settings
# ============================================================================

# NetBox API query options
netbox_api_version: "3.0"  # Adjust for your NetBox version

# NetBox inventory plugin settings (if using dynamic inventory)
# netbox_inventory:
#   compose:
#     ansible_host: primary_ip4.address | ipaddr('address')

# ============================================================================
# Safety Settings
# ============================================================================

# Prevent accidental configuration of critical interfaces
aoscx_protected_interfaces:
  - "mgmt"
  - "1/1/48"  # Example: Uplink port

# Configuration backup before changes
aoscx_backup_config: true
aoscx_backup_dir: "./config_backups"

# ============================================================================
# Manual Configuration (when not using NetBox)
# ============================================================================

# If aoscx_use_netbox: false, uncomment and define your configuration:

# VLANs
# aoscx_vlans:
#   - id: 10
#     name: "DATA"
#     description: "Data VLAN"
#   - id: 20
#     name: "VOICE"
#     description: "Voice VLAN"
#   - id: 30
#     name: "GUEST"
#     description: "Guest VLAN"
#   - id: 99
#     name: "NATIVE"
#     description: "Native VLAN"

# Interfaces
# aoscx_interfaces:
#   - name: "1/1/1"
#     description: "Server Port - Web01"
#     enabled: true
#     vlan:
#       mode: "access"
#       access_vlan: 10
#
#   - name: "1/1/2"
#     description: "IP Phone"
#     enabled: true
#     vlan:
#       mode: "access"
#       access_vlan: 20
#
#   - name: "1/1/48"
#     description: "Trunk to Core Switch"
#     enabled: true
#     vlan:
#       mode: "trunk"
#       native_vlan: 99
#       allowed_vlans: "10,20,30"
