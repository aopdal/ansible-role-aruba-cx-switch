---
# Common Variables for All Hosts
# NetBox connection settings and global configuration

# ============================================================================
# NetBox Connection Settings
# ============================================================================

netbox_url: "https://netbox.example.com"
netbox_token: "{{ vault_netbox_token }}"

# NetBox API settings
netbox_validate_certs: true  # Set to false for self-signed certs in lab

# ============================================================================
# Global Settings
# ============================================================================

# Enable NetBox integration
aoscx_use_netbox: true

# Ansible connection timeout (seconds)
ansible_command_timeout: 60

# ============================================================================
# Vault Variables (Create with: ansible-vault create vault.yml)
# ============================================================================

# vault_ansible_password: "your_switch_password"
# vault_netbox_token: "your_netbox_api_token"
