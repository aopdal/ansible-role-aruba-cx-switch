---
# BGP EVPN Fabric Inventory
# Multi-tier architecture with spines and leafs

all:
  children:
    # All Aruba CX switches in the fabric
    aruba_switches:
      children:
        spines:
          hosts:
            spine01:
              ansible_host: 10.0.0.1
              loopback_ip: 10.255.255.1
              bgp_asn: 65000

            spine02:
              ansible_host: 10.0.0.2
              loopback_ip: 10.255.255.2
              bgp_asn: 65000

        leafs:
          hosts:
            leaf01:
              ansible_host: 10.0.0.11
              loopback_ip: 10.255.255.11
              bgp_asn: 65001

            leaf02:
              ansible_host: 10.0.0.12
              loopback_ip: 10.255.255.12
              bgp_asn: 65002

        border_leafs:
          hosts:
            leaf03:
              ansible_host: 10.0.0.13
              loopback_ip: 10.255.255.13
              bgp_asn: 65003
              external_asn: 65100

            leaf04:
              ansible_host: 10.0.0.14
              loopback_ip: 10.255.255.14
              bgp_asn: 65004
              external_asn: 65100

      vars:
        # Common connection settings
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: arubanetworks.aoscx.aoscx
        ansible_user: netops
        ansible_password: "{{ vault_ansible_password }}"

        # Connection tuning for production
        ansible_command_timeout: 120
        ansible_connect_timeout: 30

        # Disable host key checking for lab (enable in production!)
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
