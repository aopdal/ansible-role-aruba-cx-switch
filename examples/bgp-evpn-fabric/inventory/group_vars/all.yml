---
# Common Variables for All Switches in Fabric
# NetBox connection and global settings

# ============================================================================
# NetBox Connection Settings
# ============================================================================

netbox_url: "https://netbox.example.com"
netbox_token: "{{ vault_netbox_token }}"

# NetBox API settings
netbox_validate_certs: true
netbox_api_version: "3.5"

# Enable NetBox integration
aoscx_use_netbox: true

# ============================================================================
# Global Fabric Settings
# ============================================================================

# Fabric-wide EVPN settings
fabric_evpn_enabled: true
fabric_vxlan_udp_port: 4789
fabric_anycast_gateway_mac: "00:00:5e:00:01:01"

# Underlay BGP settings
fabric_underlay_protocol: "bgp"
fabric_bgp_asn_base: 65000

# ============================================================================
# Ansible Connection Settings
# ============================================================================

ansible_command_timeout: 120
ansible_connect_timeout: 30

# ============================================================================
# Vault Variables
# ============================================================================
# Create with: ansible-vault create inventory/group_vars/all/vault.yml
#
# vault_ansible_password: "switch_admin_password"
# vault_netbox_token: "netbox_api_token_here"
