---
# Common Configuration for All Aruba Switches
# Role feature flags and base settings

# ============================================================================
# Feature Flags - Base Configuration
# ============================================================================

aoscx_configure_banner: true
aoscx_configure_timezone: true
aoscx_configure_ntp: true
aoscx_configure_dns: true

# ============================================================================
# Feature Flags - VLANs and Interfaces
# ============================================================================

aoscx_configure_vrfs: true
aoscx_configure_vlans: true
aoscx_configure_physical_interfaces: true
aoscx_configure_lag_interfaces: true
aoscx_configure_l2_interfaces: true
aoscx_configure_l3_interfaces: true
aoscx_configure_loopback: true

# ============================================================================
# Feature Flags - EVPN/VXLAN (Must use explicit tags)
# ============================================================================

aoscx_configure_evpn: true
aoscx_configure_vxlan: true

# ============================================================================
# Feature Flags - Routing Protocols (Require explicit tags)
# ============================================================================

# BGP must be explicitly enabled with --tags bgp
aoscx_configure_bgp: true

# OSPF disabled for this fabric (using BGP underlay)
aoscx_configure_ospf: false

# VSX configuration (for border leaf redundancy)
aoscx_configure_vsx: false

# ============================================================================
# Base System Configuration
# ============================================================================

aoscx_banner_text: |
  ************************************************************
  *                                                          *
  *       BGP EVPN Fabric - Production Environment          *
  *                                                          *
  *  This system is for authorized use only.                *
  *  All activity is monitored and logged.                  *
  *  Disconnect IMMEDIATELY if you are not authorized.      *
  *                                                          *
  ************************************************************

aoscx_timezone: "America/New_York"

aoscx_ntp_servers:
  - address: "time1.google.com"
    prefer: true
    iburst: true
  - address: "time2.google.com"
    iburst: true
  - address: "time.nist.gov"
    iburst: true

# ============================================================================
# VLAN Workflow Configuration
# ============================================================================

aoscx_vlan_workflow_enabled: true
aoscx_vlan_cleanup_enabled: true  # Remove VLANs not in NetBox
aoscx_vlan_workflow_dry_run: false

# ============================================================================
# EVPN/VXLAN Configuration
# ============================================================================

# VXLAN settings
aoscx_vxlan_source_interface: "loopback0"
aoscx_vxlan_udp_port: "{{ fabric_vxlan_udp_port }}"

# EVPN settings
aoscx_evpn_enabled: "{{ fabric_evpn_enabled }}"
aoscx_anycast_gateway_mac: "{{ fabric_anycast_gateway_mac }}"

# ============================================================================
# BGP Configuration (from NetBox BGP Plugin)
# ============================================================================

# Use NetBox BGP plugin for BGP configuration
aoscx_bgp_use_netbox_plugin: true

# Fallback: Manual BGP configuration (if not using NetBox plugin)
# aoscx_bgp_asn: "{{ bgp_asn }}"
# aoscx_bgp_router_id: "{{ loopback_ip }}"

# ============================================================================
# Safety and Backup Settings
# ============================================================================

aoscx_backup_config: true
aoscx_backup_dir: "./config_backups"

# Protected interfaces (won't be modified)
aoscx_protected_interfaces:
  - "mgmt"

# ============================================================================
# Performance Tuning
# ============================================================================

# Parallel execution settings
aoscx_max_parallel_tasks: 10

# Configuration caching
aoscx_cache_device_facts: true
aoscx_cache_timeout: 3600
