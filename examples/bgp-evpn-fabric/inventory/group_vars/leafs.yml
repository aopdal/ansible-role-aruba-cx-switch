---
# Leaf Switch Configuration
# Access layer with VXLAN tunnels and local endpoints

# ============================================================================
# Leaf Role Configuration
# ============================================================================

# Leafs are BGP route reflector clients
bgp_route_reflector: false
bgp_route_reflector_client: true

# Leafs need full EVPN/VXLAN functionality
aoscx_configure_vxlan: true
aoscx_configure_evpn: true

# Leafs have access ports for servers/endpoints
aoscx_configure_l2_interfaces: true
aoscx_configure_l3_interfaces: true

# ============================================================================
# BGP Configuration for Leafs
# ============================================================================

# BGP peering with spine switches (route reflectors)
# Specific peer configuration from NetBox BGP plugin

# Address families enabled on leafs
bgp_address_families:
  - ipv4_unicast
  - l2vpn_evpn

# ============================================================================
# VXLAN Configuration
# ============================================================================

# VXLAN tunnel source
aoscx_vxlan_source_interface: "loopback0"

# VXLAN tunnel endpoints discovered via EVPN
aoscx_vxlan_tunnel_discovery: "evpn"

# ============================================================================
# Anycast Gateway Configuration
# ============================================================================

# Enable anycast gateway for VLANs
aoscx_anycast_gateway_enabled: true
aoscx_anycast_gateway_mac: "{{ fabric_anycast_gateway_mac }}"

# Anycast IPs configured per-VLAN in NetBox config_context

# ============================================================================
# VLAN Configuration
# ============================================================================

# Leafs create VLANs for local endpoints
aoscx_configure_vlans: true

# VLAN-to-VNI mapping from NetBox
# VNI assignment happens automatically via filter plugins
