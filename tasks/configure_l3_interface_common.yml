---
# Unified L3 interface configuration task
#
# This task file provides a single, reusable implementation for configuring
# L3 interfaces across all interface types (physical, LAG, VLAN, sub-interface).
#
# interface_list is a flat list of per-IP items (from l3_interfaces.<category>).
# group_interface_ips() groups them by interface, filters to _needs_add=True,
# and sorts addresses (anycast-before-regular, IPv4 before IPv6) so that
# build_l3_config_lines() emits all config for an interface in a single call —
# including IPv4, IPv6, active-gateway, MTU, l3-counters, and OSPF.
#
# Required Parameters:
#   - interface_list: List of per-IP interface items from l3_interfaces
#   - interface_type: Type of interface ('physical', 'lag', 'vlan', 'subinterface')
#   - vrf_type: VRF type ('default' or 'custom')
#
# Optional Parameters:
#   - l3_counters_enable: Enable L3 counters (default: from aoscx_l3_counters_enable)
#   - ospf_process_id: OSPF process ID for interface config (default: 1)
#
# Uses aoscx_ospf_interface_facts (gathered in gather_facts_rest_api.yml) when available
# to skip OSPF-only pushes for interfaces that are already in the correct OSPF area.

- name: "Configure {{ interface_type }} L3 interfaces ({{ vrf_type }} VRF)"
  arubanetworks.aoscx.aoscx_config:
    lines: "{{ item | build_l3_config_lines(interface_type, vrf_type, aoscx_l3_counters_enable | default(true), ospf_process_id | default(1)) }}"
    parents: "interface {{ item.interface_name | format_interface_name(interface_type) }}"
  loop: "{{ _grouped_interfaces }}"
  loop_control:
    label: "Interface: {{ item.interface_name }}"
  when: _grouped_interfaces | length > 0
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"
    _grouped_interfaces: "{{ interface_list | group_interface_ips(aoscx_ospf_interface_facts | default(none), ospf_process_id | default(1)) }}"
