---
# Main task file for aruba_cx_switch role

# ZTP configuration generation (for initial deployment)
- name: Include ZTP configuration generation tasks
  ansible.builtin.include_tasks:
    file: generate_ztp_config.yml
    apply:
      tags:
        - ztp
        - config_generation
  when: aoscx_generate_ztp_config | default(false) | bool
  tags:
    - ztp
    - config_generation

- name: Include fact gathering tasks
  ansible.builtin.include_tasks: gather_facts.yml
  when: aoscx_gather_facts | bool
  tags:
    - always
    - facts
    - gather

# Base system configurations should be applied early
- name: Include banner configuration tasks
  ansible.builtin.include_tasks:
    file: configure_banner.yml
    apply:
      tags:
        - banner
        - base_config
        - system
  when: aoscx_configure_banner | bool
  tags:
    - banner
    - base_config
    - system

- name: Include timezone configuration tasks
  ansible.builtin.include_tasks:
    file: configure_timezone.yml
    apply:
      tags:
        - timezone
        - base_config
        - system
  when: aoscx_configure_timezone | bool
  tags:
    - timezone
    - base_config
    - system

- name: Include NTP configuration tasks
  ansible.builtin.include_tasks:
    file: configure_ntp.yml
    apply:
      tags:
        - ntp
        - base_config
        - system
  when: aoscx_configure_ntp | bool
  tags:
    - ntp
    - base_config
    - system

- name: Include DNS configuration tasks
  ansible.builtin.include_tasks:
    file: configure_dns.yml
    apply:
      tags:
        - dns
        - base_config
        - system
  when: aoscx_configure_dns | bool
  tags:
    - dns
    - base_config
    - system

# VRFs should be configured before L3 interfaces
- name: Include VRF configuration tasks
  ansible.builtin.include_tasks:
    file: configure_vrfs.yml
    apply:
      tags:
        - vrfs
        - layer3
        - routing
  when: aoscx_configure_vrfs | bool
  tags:
    - vrfs
    - layer3
    - routing

# ============================================================================
# VLAN Analysis (must run BEFORE VLAN/EVPN/VXLAN configuration)
# ============================================================================
# This identifies what VLANs need to be created/deleted based on NetBox
# and current device state. Sets facts used by all VLAN-related tasks:
# - vlans: VLANs available from NetBox
# - vlans_in_use: VLANs currently in use on interfaces
# - vlan_changes: VLANs to create/delete

- name: Identify VLAN changes (before configuration)
  ansible.builtin.include_tasks:
    file: identify_vlan_changes.yml
    apply:
      tags:
        - vlans
        - evpn
        - vxlan
        - layer2
        - overlay
  when: aoscx_configure_vlans | bool
  tags:
    - vlans
    - evpn
    - vxlan
    - layer2
    - overlay

# ============================================================================
# VLAN/EVPN/VXLAN Configuration
# ============================================================================
# VLANs should be configured before interfaces

- name: Include VLAN configuration tasks
  ansible.builtin.include_tasks:
    file: configure_vlans.yml
    apply:
      tags:
        - vlans
        - layer2
  when: aoscx_configure_vlans | bool
  tags:
    - vlans
    - layer2

# ============================================================================
# Interface Analysis (must run BEFORE interface configuration)
# ============================================================================
# This identifies which interfaces need changes by comparing NetBox with device facts
# Sets facts used by all interface-related tasks:
# - interface_changes: Categorized interfaces (physical, lag, mclag, l2, l3, no_changes)

- name: Identify interface changes (before configuration)
  ansible.builtin.include_tasks:
    file: identify_interface_changes.yml
    apply:
      tags:
        - interfaces
        - physical_interfaces
        - lag_interfaces
        - mclag_interfaces
        - l2_interfaces
        - l3_interfaces
        - layer1
        - layer2
        - layer3
  when:
    - aoscx_configure_physical_interfaces | bool or
      aoscx_configure_lag_interfaces | bool or
      aoscx_configure_mclag_interfaces | bool or
      aoscx_configure_l2_interfaces | bool or
      aoscx_configure_l3_interfaces | bool
  tags:
    - interfaces
    - physical_interfaces
    - lag_interfaces
    - mclag_interfaces
    - l2_interfaces
    - l3_interfaces
    - layer1
    - layer2
    - layer3

# ============================================================================
# Interface Configuration
# ============================================================================
# Physical interfaces should be configured before L2/L3 or LAG configuration
- name: Include physical interface configuration tasks
  ansible.builtin.include_tasks:
    file: configure_physical_interfaces.yml
    apply:
      tags:
        - interfaces
        - physical_interfaces
        - layer1
  when: aoscx_configure_physical_interfaces | bool
  tags:
    - interfaces
    - physical_interfaces
    - layer1

# LAG interfaces should be configured after physical but before L2/L3 configuration
- name: Include LAG interface configuration tasks
  ansible.builtin.include_tasks:
    file: configure_lag_interfaces.yml
    apply:
      tags:
        - interfaces
        - lag_interfaces
        - layer2
  when: aoscx_configure_lag_interfaces | bool
  tags:
    - interfaces
    - lag_interfaces
    - layer2

# MCLAG interfaces (Multi-Chassis LAG for VSX)
- name: Include MCLAG interface configuration tasks
  ansible.builtin.include_tasks:
    file: configure_mclag_interfaces.yml
    apply:
      tags:
        - interfaces
        - mclag_interfaces
        - vsx
  when: aoscx_configure_mclag_interfaces | bool
  tags:
    - interfaces
    - mclag_interfaces
    - vsx

# Assign physical interfaces to LAG (after LAG/MCLAG creation)
- name: Assign physical interfaces to LAG
  ansible.builtin.include_tasks:
    file: assign_interfaces_to_lag.yml
    apply:
      tags:
        - interfaces
        - lag_interfaces
        - mclag_interfaces
        - lag_assignment
  when:
    - aoscx_configure_lag_interfaces | bool or aoscx_configure_mclag_interfaces | bool
    - interfaces | selectattr('lag', 'defined') | selectattr('lag', '!=', none) | list | length > 0
  tags:
    - interfaces
    - lag_interfaces
    - mclag_interfaces
    - lag_assignment

# L2 interfaces (unified task - supports both standard and idempotent modes)
- name: Include L2 interface configuration tasks
  ansible.builtin.include_tasks:
    file: configure_l2_interfaces.yml
    apply:
      tags:
        - interfaces
        - l2_interfaces
        - layer2
  when: aoscx_configure_l2_interfaces | bool
  tags:
    - interfaces
    - l2_interfaces
    - layer2

- name: Include L3 interface configuration tasks
  ansible.builtin.include_tasks:
    file: configure_l3_interfaces.yml
    apply:
      tags:
        - interfaces
        - l3_interfaces
        - layer3
  when: aoscx_configure_l3_interfaces | bool
  tags:
    - interfaces
    - l3_interfaces
    - layer3

- name: Include loopback configuration tasks
  ansible.builtin.include_tasks:
    file: configure_loopback.yml
    apply:
      tags:
        - loopback
        - layer3
  when: aoscx_configure_loopback | bool
  tags:
    - loopback
    - layer3

- name: Include EVPN configuration tasks
  ansible.builtin.include_tasks:
    file: configure_evpn.yml
    apply:
      tags:
        - evpn
        - overlay
  when:
    - aoscx_configure_evpn | bool
    - custom_fields.device_evpn | default(false) | bool
  tags:
    - evpn
    - overlay

- name: Include VXLAN configuration tasks
  ansible.builtin.include_tasks:
    file: configure_vxlan.yml
    apply:
      tags:
        - vxlan
        - overlay
  when:
    - aoscx_configure_vxlan | bool
    - custom_fields.device_vxlan | default(false) | bool
  tags:
    - vxlan
    - overlay

# ============================================================================
# VLAN/EVPN/VXLAN Cleanup (only in idempotent mode)
# ============================================================================
# Cleanup order is critical:
# 1. Re-identify VLAN changes (what needs to be deleted) based on current state
# 2. Remove EVPN configuration (no vlan X under evpn)
# 3. Remove VXLAN VNI and VLAN-to-VNI mappings
# 4. Delete VLANs themselves
# This ensures proper cleanup without orphaned configurations

- name: Re-identify VLAN changes before cleanup
  ansible.builtin.include_tasks:
    file: identify_vlan_changes.yml
    apply:
      tags:
        - vlans
        - layer2
        - cleanup
        - idempotent
  when:
    - aoscx_configure_vlans | bool
    - aoscx_idempotent_mode | bool
  tags:
    - vlans
    - layer2
    - cleanup
    - idempotent

- name: Include EVPN cleanup tasks
  ansible.builtin.include_tasks:
    file: cleanup_evpn.yml
    apply:
      tags:
        - evpn
        - overlay
        - cleanup
        - idempotent
  when:
    - aoscx_configure_evpn | default(false) | bool
    - custom_fields.device_evpn | default(false) | bool
    - aoscx_idempotent_mode | bool
  tags:
    - evpn
    - overlay
    - cleanup
    - idempotent

- name: Include VXLAN cleanup tasks
  ansible.builtin.include_tasks:
    file: cleanup_vxlan.yml
    apply:
      tags:
        - vxlan
        - overlay
        - cleanup
        - idempotent
  when:
    - aoscx_configure_vxlan | default(false) | bool
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_idempotent_mode | bool
  tags:
    - vxlan
    - overlay
    - cleanup
    - idempotent

- name: Include VLAN cleanup tasks
  ansible.builtin.include_tasks:
    file: cleanup_vlans.yml
    apply:
      tags:
        - vlans
        - layer2
        - cleanup
        - idempotent
  when:
    - aoscx_configure_vlans | bool
    - aoscx_idempotent_mode | bool
  tags:
    - vlans
    - layer2
    - cleanup
    - idempotent

- name: Include OSPF configuration tasks
  ansible.builtin.include_tasks:
    file: configure_ospf.yml
    apply:
      tags:
        - ospf
        - routing
        - layer3
  when:
    - aoscx_configure_ospf | bool
    - custom_fields.device_ospf | default(false) | bool
    - "'ospf' in ansible_run_tags or 'routing' in ansible_run_tags or 'all' in ansible_run_tags"
  tags:
    - ospf
    - routing
    - layer3

- name: Include BGP configuration tasks
  ansible.builtin.include_tasks:
    file: configure_bgp.yml
    apply:
      tags:
        - bgp
        - routing
        - layer3
  when:
    - aoscx_configure_bgp | bool
    - custom_fields.device_bgp | default(false) | bool
    - "'bgp' in ansible_run_tags or 'routing' in ansible_run_tags or 'all' in ansible_run_tags"
  tags:
    - bgp
    - routing
    - layer3

- name: Include VSX configuration tasks
  ansible.builtin.include_tasks:
    file: configure_vsx.yml
    apply:
      tags:
        - vsx
        - ha
  when:
    - aoscx_configure_vsx | bool
    - custom_fields.device_vsx | default(false) | bool
    - "'vsx' in ansible_run_tags or 'ha' in ansible_run_tags or 'all' in ansible_run_tags"
  tags:
    - vsx
    - ha

# Save configuration if changes were made
- name: Save configuration when modified
  arubanetworks.aoscx.aoscx_config:
    save_when: modified
  vars:
    ansible_connection: network_cli
  when: aoscx_save_config | bool
  tags:
    - always
    - save
    - config
