---
# Main task file for aruba_cx_switch role

- name: Include fact gathering tasks
  ansible.builtin.include_tasks: gather_facts.yml
  when: aoscx_gather_facts | bool
  tags:
    - always
    - facts
    - gather

# Base system configurations should be applied early
- name: Include banner configuration tasks
  ansible.builtin.include_tasks: configure_banner.yml
  when: aoscx_configure_banner | bool
  tags:
    - banner
    - base_config
    - system

- name: Include timezone configuration tasks
  ansible.builtin.include_tasks: configure_timezone.yml
  when: aoscx_configure_timezone | bool
  tags:
    - timezone
    - base_config
    - system

- name: Include NTP configuration tasks
  ansible.builtin.include_tasks: configure_ntp.yml
  when: aoscx_configure_ntp | bool
  tags:
    - ntp
    - base_config
    - system

- name: Include DNS configuration tasks
  ansible.builtin.include_tasks: configure_dns.yml
  when: aoscx_configure_dns | bool
  tags:
    - dns
    - base_config
    - system

# VRFs should be configured before L3 interfaces
- name: Include VRF configuration tasks
  ansible.builtin.include_tasks: configure_vrfs.yml
  when: aoscx_configure_vrfs | bool
  tags:
    - vrfs
    - layer3
    - routing

# VLANs should be configured before interfaces
- name: Include VLAN configuration tasks
  ansible.builtin.include_tasks: configure_vlans.yml
  when: aoscx_configure_vlans | bool
  tags:
    - vlans
    - layer2

# Physical interfaces should be configured before L2/L3 or LAG configuration
- name: Include physical interface configuration tasks
  ansible.builtin.include_tasks: configure_physical_interfaces.yml
  when: aoscx_configure_physical_interfaces | bool
  tags:
    - interfaces
    - physical_interfaces
    - layer1

# LAG interfaces should be configured after physical but before L2/L3 configuration
- name: Include LAG interface configuration tasks
  ansible.builtin.include_tasks: configure_lag_interfaces.yml
  when: aoscx_configure_lag_interfaces | bool
  tags:
    - interfaces
    - lag_interfaces
    - layer2

# MCLAG interfaces (Multi-Chassis LAG for VSX)
- name: Include MCLAG interface configuration tasks
  ansible.builtin.include_tasks: configure_mclag_interfaces.yml
  when: aoscx_configure_mclag_interfaces | bool
  tags:
    - interfaces
    - mclag_interfaces
    - vsx

# Assign physical interfaces to LAG (after LAG/MCLAG creation)
- name: Assign physical interfaces to LAG
  ansible.builtin.include_tasks: assign_interfaces_to_lag.yml
  when:
    - aoscx_configure_lag_interfaces | bool or aoscx_configure_mclag_interfaces | bool
    - interfaces | selectattr('lag', 'defined') | selectattr('lag', '!=', none) | list | length > 0
  tags:
    - interfaces
    - lag_interfaces
    - mclag_interfaces
    - lag_assignment

# L2 interfaces (non-idempotent mode - for initial config)
- name: Include L2 interface configuration tasks
  ansible.builtin.include_tasks: configure_l2_interfaces.yml
  when:
    - aoscx_configure_l2_interfaces | bool
    - not (aoscx_idempotent_mode | bool)
  tags:
    - interfaces
    - l2_interfaces
    - layer2

# L2 interfaces (idempotent mode - removes unwanted configs)
- name: Include L2 interface configuration tasks (idempotent)
  ansible.builtin.include_tasks: configure_l2_interfaces_idempotent.yml
  when:
    - aoscx_configure_l2_interfaces | bool
    - aoscx_idempotent_mode | bool
  tags:
    - interfaces
    - l2_interfaces
    - layer2
    - idempotent

- name: Include L3 interface configuration tasks
  ansible.builtin.include_tasks: configure_l3_interfaces.yml
  when: aoscx_configure_l3_interfaces | bool
  tags:
    - interfaces
    - l3_interfaces
    - layer3

- name: Include loopback configuration tasks
  ansible.builtin.include_tasks: configure_loopback.yml
  when: aoscx_configure_loopback | bool
  tags:
    - loopback
    - layer3

- name: Include EVPN configuration tasks
  ansible.builtin.include_tasks: configure_evpn.yml
  when: aoscx_configure_evpn | bool
  tags:
    - evpn
    - overlay

- name: Include VXLAN configuration tasks
  ansible.builtin.include_tasks: configure_vxlan.yml
  when: aoscx_configure_vxlan | bool
  tags:
    - vxlan
    - overlay

# VLAN cleanup should happen AFTER all interfaces and overlays are cleaned up
# This ensures VLANs are not in use on: trunk ports, access ports, SVIs, or EVPN/VXLAN
- name: Include VLAN cleanup tasks
  ansible.builtin.include_tasks: cleanup_vlans.yml
  when:
    - aoscx_configure_vlans | bool
    - aoscx_idempotent_mode | bool
  tags:
    - vlans
    - layer2
    - cleanup
    - idempotent

- name: Include OSPF configuration tasks
  ansible.builtin.include_tasks: configure_ospf.yml
  when: aoscx_configure_ospf | bool
  tags:
    - ospf
    - routing
    - layer3

- name: Include BGP configuration tasks
  ansible.builtin.include_tasks: configure_bgp.yml
  when: aoscx_configure_bgp | bool
  tags:
    - bgp
    - routing
    - layer3

- name: Include VSX configuration tasks
  ansible.builtin.include_tasks: configure_vsx.yml
  when: aoscx_configure_vsx | bool
  tags:
    - vsx
    - ha

# Save configuration if changes were made
- name: Save configuration when modified
  arubanetworks.aoscx.aoscx_config:
    save_when: modified
  vars:
    ansible_connection: network_cli
  when: aoscx_save_config | bool
  tags:
    - always
    - save
    - config
