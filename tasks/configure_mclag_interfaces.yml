---
# Configure MCLAG (Multi-Chassis LAG) interfaces
# These require special handling and use "multi-chassis" keyword

- name: configure_mclag_interfaces | Debug MCLAG interfaces to configure
  ansible.builtin.debug:
    msg:
      - "Configuring MCLAG interfaces"
      - "MCLAGs found: {{ interfaces | selectattr('custom_fields.if_mclag', 'defined') |
          selectattr('custom_fields.if_mclag', 'equalto', true) | map(attribute='name') | list }}"
  when: aoscx_debug | bool

# Note: MCLAG interfaces use "multi-chassis" keyword and are part of VSX configuration
# This task provides basic interface configuration, but full MCLAG setup
# requires additional VSX domain and peer configuration

- name: configure_mclag_interfaces | Configure MCLAG interface description
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }} multi-chassis
    lines:
      - description {{ item.description }}
    match: line
  loop: "{{ interfaces | selectattr('type', 'defined') | list }}"
  loop_control:
    label: "MCLAG Interface: {{ item.name }} - Description: {{ item.description | default('(none)') }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - item.custom_fields.if_mclag | default(false)
    - item.description is defined
    - item.description != ""
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

# Enable MCLAG interfaces
- name: configure_mclag_interfaces | Configure MCLAG interface enable (no shutdown)
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }} multi-chassis
    lines:
      - no shutdown
    match: line
  loop: "{{ interfaces | selectattr('type', 'defined') | list }}"
  loop_control:
    label: "MCLAG Interface: {{ item.name }} - Enabled: {{ item.enabled | default(true) }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - item.custom_fields.if_mclag | default(false)
    - item.enabled | default(true)
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

# Disable MCLAG interfaces
- name: configure_mclag_interfaces | Configure MCLAG interface disable (shutdown)
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }} multi-chassis
    lines:
      - shutdown
    match: line
  loop: "{{ interfaces | selectattr('type', 'defined') | list }}"
  loop_control:
    label: "MCLAG Interface: {{ item.name }} - Enabled: {{ item.enabled | default(true) }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - item.custom_fields.if_mclag | default(false)
    - not (item.enabled | default(true))
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

# Configure LACP mode active on MCLAG interfaces
- name: configure_mclag_interfaces | Configure MCLAG LACP mode active
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }} multi-chassis
    lines:
      - lacp mode active
    match: line
  loop: "{{ interfaces | selectattr('type', 'defined') | list }}"
  loop_control:
    label: "MCLAG Interface: {{ item.name }} - LACP: {{ item.custom_fields.if_lacp | default(true) }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - item.custom_fields.if_mclag | default(false)
    - item.custom_fields.if_lacp | default(true)
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

- name: configure_mclag_interfaces | MCLAG configuration summary
  ansible.builtin.debug:
    msg:
      - "MCLAG Configuration Summary:"
      - "MCLAG interfaces configured"
      - "Note: Full MCLAG functionality requires VSX domain configuration"
  when: aoscx_debug | bool
