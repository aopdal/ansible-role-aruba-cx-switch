---
# REST API-based fact gathering
#
# Used when aoscx_gather_facts_rest_api: true
# - Gathers interfaces, VLANs, EVPN, VXLAN, and OSPF interface data
# - Sets ansible_facts.network_resources.{interfaces,vlans}
# - Also sets aoscx_enhanced_interface_facts (raw REST response)
# - Faster than aoscx_facts (single authenticated session)
#
# Note: VSX-specific attributes (ip4_address_secondary, vsx_virtual_ip4, vsx_virtual_ip6,
# vsx_virtual_gw_mac_v4, vsx_virtual_gw_mac_v6) are only queried when device_vsx is enabled.
# Some switch models (e.g., CX 6000) don't support these attributes.
#
# Requirements:
# - REST API version 10.15 or later (auto-detected from firmware if not specified)
#
# Output facts (full mode):
# - ansible_facts.network_resources.interfaces
# - ansible_facts.network_resources.vlans
# - aoscx_enhanced_interface_facts (raw REST API response)
# - aoscx_evpn_facts (when EVPN enabled)
# - aoscx_vni_facts (when VXLAN enabled)
#
# Output facts (enhanced-only mode):
# - aoscx_enhanced_interface_facts (raw REST API response)

- name: Set REST API connection variables
  ansible.builtin.set_fact:
    _rest_host: "{{ aoscx_rest_host | default(ansible_host) }}"
    _rest_user: "{{ aoscx_rest_user | default(ansible_user) }}"
    _rest_password: "{{ aoscx_rest_password | default(ansible_password) }}"
    _rest_validate_certs: "{{ aoscx_rest_validate_certs | default(false) }}"
  no_log: true
  tags:
    - always

# Auto-detect API version from firmware endpoint when not explicitly configured.
# The aoscx_facts module may report an older version (e.g., 10.09) but the switch
# may support newer versions (e.g., 10.17) that properly expand ip6_addresses with depth=2.
- name: Query available REST API versions
  ansible.builtin.uri:
    url: "https://{{ _rest_host }}/rest/v1/firmware"
    method: GET
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200 ]
    return_content: true
  register: _rest_firmware
  delegate_to: localhost
  ignore_errors: true
  when: aoscx_rest_api_version is not defined
  tags:
    - always

- name: Determine REST API version
  ansible.builtin.set_fact:
    # Version selection priority:
    # 1. Explicit aoscx_rest_api_version (user-configured)
    # 2. Auto-detected from firmware current_version (e.g., "FL.10.14.0001" -> "10.14")
    # 3. Default to 10.15
    _rest_api_version: >-
      {%- if aoscx_rest_api_version is defined -%}
        {{ aoscx_rest_api_version }}
      {%- elif _rest_firmware is not skipped and _rest_firmware is succeeded
              and _rest_firmware.json.current_version is defined -%}
        {{ _rest_firmware.json.current_version | regex_search('([0-9]+\.[0-9]+)', '\1') | first | default('10.15') }}
      {%- else -%}
        10.15
      {%- endif -%}
  tags:
    - always

- name: Set REST API base URL
  ansible.builtin.set_fact:
    _rest_api_base: "https://{{ _rest_host }}/rest/v{{ _rest_api_version }}"
  tags:
    - always

# Build attributes list dynamically based on device capabilities.
# Base attributes are always queried; VSX-specific attributes only when device_vsx is enabled.
# CX 6000 and some other models don't support ip4_address_secondary or vsx_virtual_* fields.
- name: Set interface attributes to query
  ansible.builtin.set_fact:
    _rest_interface_base_attrs: "{{
      'name,admin,description,mtu,type,ip4_address,ip6_addresses,' ~
      'ip6_address_link_local,' ~
      'vlan_mode,vlan_tag,vlan_trunks,lacp_status,bond_status,' ~
      'other_config,routing,vrf' }}"
    _rest_interface_ospf_attrs: "ospf_if_type,ospf_auth_type"
    _rest_interface_vsx_attrs: "ip4_address_secondary,vsx_virtual_ip4,vsx_virtual_i\
      p6,vsx_virtual_gw_mac_v4,vsx_virtual_gw_mac_v6"
  tags:
    - always

- name: Build interface attributes query string
  ansible.builtin.set_fact:
    _rest_interface_attrs: >-
      {{ _rest_interface_base_attrs }}{% if custom_fields.device_ospf |
      default(false) | bool %},{{ _rest_interface_ospf_attrs }}{% endif %}{% if
      custom_fields.device_vsx | default(false) | bool %},{{
      _rest_interface_vsx_attrs }}{% endif %}
  tags:
    - always

- name: Debug - Show REST API configuration
  ansible.builtin.debug:
    msg:
      - "REST API host: {{ _rest_host }}"
      - "REST API version: {{ _rest_api_version }}"
      - "REST API base URL: {{ _rest_api_base }}"
      - "Device OSPF enabled: {{ custom_fields.device_ospf | default(false) }}"
      - "Device VSX enabled: {{ custom_fields.device_vsx | default(false) }}"
      - "Interface attributes to query: {{ _rest_interface_attrs }}"
  when:
    - aoscx_debug | default(false) | bool
  tags:
    - always

- name: Login to AOS-CX REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/login"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ _rest_user }}"
      password: "{{ _rest_password }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200 ]
    return_content: true
  register: _rest_login
  delegate_to: localhost
  no_log: "{{ aoscx_no_log | default(true) }}"
  tags:
    - always

# Query interfaces with depth=2 to get expanded IPv6 addresses and VSX virtual IPs
- name: Query interfaces via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/interfaces?depth=2&attributes={{
      _rest_interface_attrs }}"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200 ]
    return_content: true
  register: _rest_interfaces
  delegate_to: localhost
  tags:
    - always

# Query VLANs (full mode only)
# Note: Using depth=2 to get full VLAN data (depth=1 may return URIs only)
# Include IGMP attributes for intelligent IGMP snooping configuration
- name: Query VLANs via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base
      }}/system/vlans?attributes=mgmd_oper_version,mgmd_enable_status,mgmd_enab\
      le,mgmd_igmp_version,mgmd_mld_version&depth=2"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200 ]
    return_content: true
  register: _rest_vlans
  delegate_to: localhost
  tags:
    - always

- name: Debug - Show raw VLAN REST API response
  ansible.builtin.debug:
    msg:
      - "VLAN response type: {{ _rest_vlans.json | type_debug }}"
      - "VLAN response keys: {{ _rest_vlans.json.keys() | list if
        _rest_vlans.json is mapping else 'NOT A DICT' }}"
      - "VLAN response (first 500 chars): {{ _rest_vlans.json | string |
        truncate(500) }}"
  when:
    - aoscx_debug | default(false) | bool
    - _rest_vlans is defined
  tags:
    - always

# Query EVPN configuration (full mode, optional)
- name: Query EVPN configuration via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/evpn?depth=2"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200, 404 ]
    return_content: true
  register: _rest_evpn
  delegate_to: localhost
  when:
    - aoscx_configure_evpn | default(false) | bool
    - custom_fields.device_vxlan | default(false) | bool
  tags:
    - always

# Query EVPN VLANs (full mode, optional)
- name: Query EVPN VLANs via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/evpn/evpn_vlans?depth=1"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200, 404 ]
    return_content: true
  register: _rest_evpn_vlans
  delegate_to: localhost
  when:
    - aoscx_configure_evpn | default(false) | bool
    - custom_fields.device_vxlan | default(false) | bool
  tags:
    - always

# Query VNI/VXLAN mappings (full mode, optional)
- name: Query VNI mappings via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/virtual_network_ids?depth=1"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200, 404 ]
    return_content: true
  register: _rest_vnis
  delegate_to: localhost
  when:
    - aoscx_configure_vxlan | default(false) | bool
    - custom_fields.device_vxlan | default(false) | bool
  tags:
    - always

# Query OSPF interface facts (optional, when OSPF is configured on the device)
# Skipped unless both aoscx_configure_ospf and custom_fields.device_ospf are true.
# Determines which interfaces are already registered in each OSPF area so that
# group_interface_ips can skip interfaces where OSPF config has not changed.
#
# Queries one endpoint per unique (VRF, area) combination found in NetBox interfaces:
#   /system/vrfs/{vrf}/ospf_routers/{process_id}/areas/{area}/ospf_interfaces
#
# Output: aoscx_ospf_interface_facts = { vrf: { process_id: { area: { intf_name: { ospf_if_type: ... } } } } }
- name: Build OSPF query list from NetBox interfaces
  ansible.builtin.set_fact:
    _ospf_queries: >-
      {%- set queries = [] -%} {%- set seen = [] -%} {%- for intf in interfaces
      | default([]) | select_ospf_interfaces -%}
        {%- set vrf = (intf.vrf.name | default('default')) if intf.vrf is mapping else 'default' -%}
        {%- set area = intf.custom_fields.if_ip_ospf_1_area -%}
        {%- set key = vrf ~ '|1|' ~ area -%}
        {%- if key not in seen -%}
          {%- set _ = seen.append(key) -%}
          {%- set _ = queries.append({'vrf': vrf, 'process_id': '1', 'area': area}) -%}
        {%- endif -%}
      {%- endfor -%} {{ queries }}
  when:
    - aoscx_configure_ospf | default(false) | bool
    - custom_fields.device_ospf | default(false) | bool
  tags:
    - always

- name: Query OSPF interface facts from REST API
  ansible.builtin.uri:
    url: >-
      {{ _rest_api_base }}/system/vrfs/{{ item.vrf }}/ospf_routers/{{
      item.process_id }}/areas/{{ item.area
      }}/ospf_interfaces?attributes=port&depth=1
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200, 404 ]
    return_content: true
  loop: "{{ _ospf_queries | default([]) }}"
  loop_control:
    label: "VRF {{ item.vrf }} process {{ item.process_id }} area {{ item.area }}"
  register: _rest_ospf_results
  delegate_to: localhost
  when:
    - aoscx_configure_ospf | default(false) | bool
    - custom_fields.device_ospf | default(false) | bool
    - _ospf_queries | default([]) | length > 0
  tags:
    - always

- name: Build OSPF interface facts from REST API responses
  ansible.builtin.set_fact:
    aoscx_ospf_interface_facts: >-
      {%- set result = {} -%} {%- for resp in _rest_ospf_results.results |
      default([]) -%}
        {%- if resp.status == 200 and resp.json is mapping -%}
          {%- set vrf = resp.item.vrf -%}
          {%- set pid = resp.item.process_id -%}
          {%- set area = resp.item.area -%}
          {%- if vrf not in result -%}{%- set _ = result.update({vrf: {}}) -%}{%- endif -%}
          {%- if pid not in result[vrf] -%}{%- set _ = result[vrf].update({pid: {}}) -%}{%- endif -%}
          {%- set area_dict = {} -%}
          {%- for intf_name in resp.json.keys() -%}
            {%- set intf_data = _rest_interfaces.json.get(intf_name, {}) -%}
            {%- set _ = area_dict.update({intf_name: {
                'ospf_if_type': intf_data.get('ospf_if_type'),
                'ospf_auth_type': intf_data.get('ospf_auth_type'),
            }}) -%}
          {%- endfor -%}
          {%- set _ = result[vrf][pid].update({area: area_dict}) -%}
        {%- endif -%}
      {%- endfor -%} {{ result }}
  when:
    - aoscx_configure_ospf | default(false) | bool
    - custom_fields.device_ospf | default(false) | bool
    - _rest_ospf_results is defined
  tags:
    - always

# Logout to clean up session
- name: Logout from AOS-CX REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/logout"
    method: POST
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [ 200, 204 ]
  delegate_to: localhost
  no_log: true
  tags:
    - always

# Store raw REST API response for enhanced facts (IPv6, VSX virtual IPs).
# Set in both full and enhanced-only modes.
- name: Store enhanced interface facts
  ansible.builtin.set_fact:
    aoscx_enhanced_interface_facts: "{{ _rest_interfaces.json }}"
  tags:
    - always

# Store raw VLAN facts including IGMP settings for intelligent configuration
- name: Store enhanced VLAN facts
  ansible.builtin.set_fact:
    aoscx_enhanced_vlan_facts: "{{ _rest_vlans.json }}"
  tags:
    - always

# Transform REST API responses to ansible_facts format.
# IMPORTANT: Do NOT set ansible_aoscx_rest_version here!
# pyaoscx modules require ansible_aoscx_rest_version: 10.09 (max supported).
# We use _rest_api_version separately for direct REST API calls.
- name: Set interface and VLAN facts from REST API response
  ansible.builtin.set_fact:
    ansible_facts:
      network_resources:
        interfaces: "{{ _rest_interfaces.json | rest_api_to_aoscx_interfaces }}"
        vlans: "{{ _rest_vlans.json | rest_api_to_aoscx_vlans }}"
  tags:
    - always

- name: Set EVPN facts from REST API response
  ansible.builtin.set_fact:
    aoscx_evpn_facts: "{{ _rest_evpn.json | default({}) }}"
    aoscx_evpn_vlans_facts: "{{ _rest_evpn_vlans.json | default({}) }}"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_configure_evpn | default(false) | bool
    - _rest_evpn is defined
    - _rest_evpn.status == 200
  tags:
    - always

- name: Set VNI facts from REST API response
  ansible.builtin.set_fact:
    aoscx_vni_facts: "{{ _rest_vnis.json | default({}) }}"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_configure_vxlan | default(false) | bool
    - _rest_vnis is defined
    - _rest_vnis.status == 200
  tags:
    - always

- name: Debug - Show REST API facts summary
  ansible.builtin.debug:
    msg: >-
      {{ [
        '=== REST API Fact Gathering Complete ===',
        'Interfaces found: ' ~ (ansible_facts.network_resources.interfaces | length),
        'VLANs found: ' ~ (ansible_facts.network_resources.vlans | length),
        'Enhanced interface facts: ' ~ (aoscx_enhanced_interface_facts | length),
        'Enhanced VLAN facts: ' ~ (aoscx_enhanced_vlan_facts | length),
        'EVPN facts available: ' ~ (aoscx_evpn_facts is defined),
        'VNI facts available: ' ~ (aoscx_vni_facts is defined)
      ] }}
  when:
    - aoscx_debug | default(false) | bool
  tags:
    - always
