---
# REST API-based fact gathering
#
# Used when aoscx_gather_facts_rest_api: true
# - Gathers interfaces, VLANs, EVPN, VXLAN, and OSPF interface data
# - Sets ansible_facts.network_resources.{interfaces,vlans}
# - Also sets aoscx_enhanced_interface_facts (raw REST response)
# - Faster than aoscx_facts (single authenticated session)
#
# Note: VSX-specific attributes (ip4_address_secondary, vsx_virtual_ip4, vsx_virtual_ip6,
# vsx_virtual_gw_mac_v4, vsx_virtual_gw_mac_v6) are only queried when device_vsx is enabled.
# Some switch models (e.g., CX 6000) don't support these attributes.
#
# Feature-specific queries below (OSPF, VSX, static routes, VRFs, STP,
# EVPN/VXLAN, port-access, DHCP relay) only run when their data has a
# consumer: the matching aoscx_configure_* flag must also be true, OR
# aoscx_test_mode: true is set. aoscx_test_mode exists for test/report-only
# playbooks that need REST facts gathered even when aoscx_configure_*: false
# (e.g. verifying device state without pushing config) - use it there
# instead of flipping individual aoscx_configure_* flags to true.
#
# Requirements:
# - REST API version 10.15 or later (auto-detected from firmware if not specified)
#
# Output facts (full mode):
# - ansible_facts.network_resources.interfaces
# - ansible_facts.network_resources.vlans
# - aoscx_enhanced_interface_facts (raw REST API response)
# - aoscx_evpn_facts (when EVPN enabled)
# - aoscx_vni_facts (when VXLAN enabled)
# - aoscx_vsx_facts (when device_vsx enabled)
# - aoscx_stp_global_facts (when aoscx_configure_stp enabled)
# - aoscx_port_access_facts (when port_access is defined in the device's
#   NetBox config_context). Built from a single REST call to
#   /system/device_profiles?depth=5, then flattened by the
#   port_access_facts_from_device_profiles filter into:
#     {
#       'device_profiles': <full payload, dict keyed by profile name>,
#       'roles':           <flattened dict keyed by role name>,
#       'lldp_groups':     <flattened dict keyed by lldp-group name>,
#       'mac_groups':      <flattened dict keyed by mac-group name>
#     }
#
# Output facts (enhanced-only mode):
# - aoscx_enhanced_interface_facts (raw REST API response)

- name: Set REST API connection variables
  ansible.builtin.set_fact:
    _rest_host: "{{ aoscx_rest_host | default(ansible_host) }}"
    _rest_user: "{{ aoscx_rest_user | default(ansible_user) }}"
    _rest_password: "{{ aoscx_rest_password | default(ansible_password) }}"
    _rest_validate_certs: "{{ aoscx_rest_validate_certs | default(false) }}"
  no_log: true
  tags:
    - always

# Auto-detect API version from firmware endpoint when not explicitly configured.
# The aoscx_facts module may report an older version (e.g., 10.09) but the switch
# may support newer versions (e.g., 10.17) that properly expand ip6_addresses with depth=2.
- name: Query available REST API versions
  ansible.builtin.uri:
    url: "https://{{ _rest_host }}/rest/v1/firmware"
    method: GET
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_firmware
  delegate_to: localhost
  ignore_errors: true
  when: aoscx_rest_api_version is not defined
  tags:
    - always

- name: Determine REST API version
  ansible.builtin.set_fact:
    # Version selection priority:
    # 1. Explicit aoscx_rest_api_version (user-configured)
    # 2. Auto-detected from firmware current_version (e.g., "FL.10.14.0001" -> "10.14")
    # 3. Default to 10.15
    _rest_api_version: >-
      {%- if aoscx_rest_api_version is defined -%}
        {{ aoscx_rest_api_version }}
      {%- elif _rest_firmware is not skipped and _rest_firmware is succeeded
              and _rest_firmware.json.current_version is defined -%}
        {{ _rest_firmware.json.current_version | regex_search('([0-9]+\.[0-9]+)', '\1') | first | default('10.15') }}
      {%- else -%}
        10.15
      {%- endif -%}
  tags:
    - always

- name: Set REST API base URL
  ansible.builtin.set_fact:
    _rest_api_base: "https://{{ _rest_host }}/rest/v{{ _rest_api_version }}"
  tags:
    - always

# Build attributes list dynamically based on device capabilities.
# Base attributes are always queried; VSX-specific attributes only when device_vsx is enabled.
# CX 6000 and some other models don't support ip4_address_secondary or vsx_virtual_* fields.
- name: Set interface attributes to query
  ansible.builtin.set_fact:
    _rest_interface_base_attrs: "{{
      'name,admin,description,mtu,type,interfaces,ip4_address,ip6_addresses,' ~
      'ip6_address_link_local,' ~
      'vlan_mode,vlan_tag,vlan_trunks,lacp_status,bond_status,' ~
      'other_config,routing,vrf' }}"
    _rest_interface_ospf_attrs: "ospf_if_type,ospf_auth_type"
    _rest_interface_vsx_attrs:
      "ip4_address_secondary,vsx_virtual_ip4,vsx_virtual_i\
      p6,vsx_virtual_gw_mac_v4,vsx_virtual_gw_mac_v6"
    # stp_config is a nested dict; depth=2 expands it into full key/value pairs
    _rest_interface_stp_attrs: "stp_config"
  tags:
    - always

- name: Build interface attributes query string
  ansible.builtin.set_fact:
    _rest_interface_attrs: >-
      {{ _rest_interface_base_attrs }}{% if custom_fields.device_ospf |
      default(false) | bool and (aoscx_configure_ospf | bool or
      aoscx_test_mode | bool) %},{{ _rest_interface_ospf_attrs }}{% endif
      %}{% if custom_fields.device_vsx | default(false) | bool and
      (aoscx_configure_vsx | bool or aoscx_test_mode | bool) %},{{
      _rest_interface_vsx_attrs }}{% endif %}{% if aoscx_configure_stp | bool
      or aoscx_test_mode | bool %},{{ _rest_interface_stp_attrs }}{% endif %}
  tags:
    - always

- name: Debug - Show REST API configuration
  ansible.builtin.debug:
    msg:
      - "REST API host: {{ _rest_host }}"
      - "REST API version: {{ _rest_api_version }}"
      - "REST API base URL: {{ _rest_api_base }}"
      - "Device OSPF enabled: {{ custom_fields.device_ospf | default(false) }}"
      - "Device VSX enabled: {{ custom_fields.device_vsx | default(false) }}"
      - "STP configuration enabled: {{ aoscx_configure_stp | default(true) }}"
      - "Interface attributes to query: {{ _rest_interface_attrs }}"
  when:
    - aoscx_debug | default(false) | bool or ansible_verbosity >= 1
  tags:
    - always

- name: Login to AOS-CX REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/login"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ _rest_user }}"
      password: "{{ _rest_password }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_login
  delegate_to: localhost
  no_log: "{{ aoscx_no_log | default(true) }}"
  tags:
    - always

# Query interfaces with depth=2 to get expanded IPv6 addresses and VSX virtual IPs
- name: Query interfaces via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/interfaces?depth=2&attributes={{
      _rest_interface_attrs }}"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_interfaces
  delegate_to: localhost
  tags:
    - always

# Query VLANs (full mode only)
# Note: Using depth=2 to get full VLAN data (depth=1 may return URIs only)
# Include IGMP attributes for intelligent IGMP snooping configuration
- name: Query VLANs via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base
      }}/system/vlans?attributes=name,description,admin,type,voice,oper_state,\
      mgmd_oper_version,mgmd_enable_status,mgmd_enable,mgmd_igmp_version,\
      mgmd_mld_version&depth=2"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_vlans
  delegate_to: localhost
  tags:
    - always

- name: Debug - Show raw VLAN REST API response
  ansible.builtin.debug:
    msg:
      - "VLAN response type: {{ _rest_vlans.json | type_debug }}"
      - "VLAN response keys: {{ _rest_vlans.json.keys() | list if
        _rest_vlans.json is mapping else 'NOT A DICT' }}"
      - "VLAN response (first 500 chars): {{ _rest_vlans.json | string |
        truncate(500) }}"
  when:
    - aoscx_debug | default(false) | bool or ansible_verbosity >= 1
    - _rest_vlans is defined
  tags:
    - always

# Query EVPN configuration (full mode, optional)
- name: Query EVPN configuration via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/evpn?depth=2"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  register: _rest_evpn
  delegate_to: localhost
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_configure_evpn | default(false) | bool or aoscx_test_mode | bool
  tags:
    - always

# Query EVPN VLANs (full mode, optional)
- name: Query EVPN VLANs via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/evpn/evpn_vlans?depth=1"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  register: _rest_evpn_vlans
  delegate_to: localhost
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_configure_evpn | default(false) | bool or aoscx_test_mode | bool
  tags:
    - always

# Query VNI/VXLAN mappings (full mode, optional)
- name: Query VNI mappings via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/virtual_network_ids?depth=1"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  register: _rest_vnis
  delegate_to: localhost
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_configure_vxlan | default(false) | bool or aoscx_test_mode | bool
  tags:
    - always

# Query global STP configuration from /system?attributes=stp_config
# Returns mstp_config_name, mstp_config_revision, priority, stp_mode, etc.
- name: Query global STP configuration via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system?attributes=stp_config&depth=1"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_stp_global
  delegate_to: localhost
  when: aoscx_configure_stp | bool or aoscx_test_mode | bool
  tags:
    - always

# Query VSX configuration (optional, only when device_vsx is enabled)
# Not all switch models support VSX (e.g., CX 6000), so gate on the custom field.
- name: Query VSX configuration via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/vsx?attributes=device_role,isl_port,keepalive_src_ip,keepalive_peer_ip,keepalive_vrf,system_mac&depth=1"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  register: _rest_vsx
  delegate_to: localhost
  when:
    - custom_fields.device_vsx | default(false) | bool
    - aoscx_configure_vsx | bool or aoscx_test_mode | bool
  tags:
    - always

# Query port-access (device-profile) configuration via REST API.
# Gated so we never query when port-access is not in scope for the device.
# A single GET on /system/device_profiles?depth=5 returns each profile with
# its associated role, lldp_groups (including expanded match entries), and
# mac_groups inline. The port_access_facts_from_device_profiles filter then
# flattens the response into the {device_profiles, roles, lldp_groups,
# mac_groups} shape that port_access_diff expects - so one REST call
# replaces four. (depth=4 leaves lldp/mac entry values as URI strings;
# depth=5 expands them to {seq, vendor_oui|mac_oui|...} dicts.)
- name: Query port-access device-profiles via REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/device_profiles?attributes=&depth=5"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 400, 404]
    return_content: true
  register: _rest_port_access_profiles
  delegate_to: localhost
  when:
    - (port_access | default({})) | length > 0
    - aoscx_configure_port_access | default(true) | bool or aoscx_test_mode | bool
  tags:
    - always

# Query OSPF interface facts (optional, when OSPF is enabled on the device)
# Skipped unless custom_fields.device_ospf is true and either
# aoscx_configure_ospf or aoscx_test_mode is true. The latter lets
# report-only/verification playbooks (which set aoscx_configure_ospf: false)
# still compare NetBox intent against what the device actually has
# configured - matching the pattern used for static route facts below.
# Determines which interfaces are already registered in each OSPF area so that
# group_interface_ips can skip interfaces where OSPF config has not changed.
#
# Queries one endpoint per unique (VRF, area) combination found in NetBox interfaces:
#   /system/vrfs/{vrf}/ospf_routers/{process_id}/areas/{area}/ospf_interfaces
#
# Output: aoscx_ospf_interface_facts = { vrf: { process_id: { area: { intf_name: { ospf_if_type: ... } } } } }
- name: Build OSPF query list from NetBox interfaces
  ansible.builtin.set_fact:
    _ospf_queries: >-
      {%- set queries = [] -%} {%- set seen = [] -%} {%- for intf in interfaces
      | default([]) | select_ospf_interfaces -%}
        {%- set vrf = (intf.vrf.name | default('default')) if intf.vrf is mapping else 'default' -%}
        {%- set area = intf.custom_fields.if_ip_ospf_1_area -%}
        {%- set key = vrf ~ '|1|' ~ area -%}
        {%- if key not in seen -%}
          {%- set _ = seen.append(key) -%}
          {%- set _ = queries.append({'vrf': vrf, 'process_id': '1', 'area': area}) -%}
        {%- endif -%}
      {%- endfor -%} {{ queries }}
  when:
    - custom_fields.device_ospf | default(false) | bool
    - aoscx_configure_ospf | bool or aoscx_test_mode | bool
  tags:
    - always

- name: Query OSPF interface facts from REST API
  ansible.builtin.uri:
    url: >-
      {{ _rest_api_base }}/system/vrfs/{{ item.vrf }}/ospf_routers/{{
      item.process_id }}/areas/{{ item.area
      }}/ospf_interfaces?attributes=port&depth=1
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  loop: "{{ _ospf_queries | default([]) }}"
  loop_control:
    label: "VRF {{ item.vrf }} process {{ item.process_id }} area {{ item.area }}"
  register: _rest_ospf_results
  delegate_to: localhost
  when:
    - custom_fields.device_ospf | default(false) | bool
    - _ospf_queries | default([]) | length > 0
  tags:
    - always

- name: Build OSPF interface facts from REST API responses
  ansible.builtin.set_fact:
    aoscx_ospf_interface_facts: >-
      {%- set result = {} -%} {%- for resp in _rest_ospf_results.results |
      default([]) -%}
        {%- if resp.status == 200 and resp.json is mapping -%}
          {%- set vrf = resp.item.vrf -%}
          {%- set pid = resp.item.process_id -%}
          {%- set area = resp.item.area -%}
          {%- if vrf not in result -%}{%- set _ = result.update({vrf: {}}) -%}{%- endif -%}
          {%- if pid not in result[vrf] -%}{%- set _ = result[vrf].update({pid: {}}) -%}{%- endif -%}
          {%- set area_dict = {} -%}
          {%- for intf_name in resp.json.keys() -%}
            {%- set intf_data = _rest_interfaces.json.get(intf_name, {}) -%}
            {%- set _ = area_dict.update({intf_name: {
                'ospf_if_type': intf_data.get('ospf_if_type'),
                'ospf_auth_type': intf_data.get('ospf_auth_type'),
            }}) -%}
          {%- endfor -%}
          {%- set _ = result[vrf][pid].update({area: area_dict}) -%}
        {%- endif -%}
      {%- endfor -%} {{ result }}
  when:
    - custom_fields.device_ospf | default(false) | bool
    - aoscx_configure_ospf | bool or aoscx_test_mode | bool
    - _rest_ospf_results is defined
  tags:
    - always

# Query OSPF router facts (optional, when OSPF is enabled on the device)
# Skipped unless custom_fields.device_ospf is true and either
# aoscx_configure_ospf or aoscx_test_mode is true, same rationale as the
# interface facts above.
#
# Queries two endpoints per VRF found in the NetBox OSPF config context
# (ospf_vrfs, or the legacy ospf_1_vrf/ospf_areas format via normalize_ospf_vrfs):
#   /system/vrfs/{vrf}/ospf_routers/{process_id}?attributes=admin_router_id,passive_interfaces
#   /system/vrfs/{vrf}/ospf_routers/{process_id}/areas?depth=1
# "areas" on the router endpoint is a child-table reference, not a
# reference-list attribute like passive_interfaces, so it does not expand
# when requested via attributes=/depth= on the router endpoint itself - it
# is always returned as the raw sub-collection URL string. The area IDs
# must be queried from that sub-collection endpoint directly.
#
# Output: aoscx_ospf_router_facts = { vrf: { process_id: { router_id: str,
#         areas: [area, ...], passive_interfaces: [intf_name, ...] } } }
# passive_interfaces is device-wide per VRF/process (AOS-CX has no
# per-interface REST attribute for passive state - it lives on the router).
- name: Build OSPF router query list from NetBox config context
  ansible.builtin.set_fact:
    _ospf_router_queries: >-
      {%- set queries = [] -%}
      {%- set pid = (ospf_process_id | default(1)) | string -%}
      {%- for vrf_entry in (ospf_vrfs | default(none)) |
        normalize_ospf_vrfs(ospf_1_vrf | default(none), ospf_areas | default(none)) -%}
        {%- set _ = queries.append({'vrf': vrf_entry.vrf, 'process_id': pid}) -%}
      {%- endfor -%} {{ queries }}
  when:
    - custom_fields.device_ospf | default(false) | bool
    - aoscx_configure_ospf | bool or aoscx_test_mode | bool
  tags:
    - always

- name: Query OSPF router facts from REST API
  ansible.builtin.uri:
    url: >-
      {{ _rest_api_base }}/system/vrfs/{{ item.vrf }}/ospf_routers/{{
      item.process_id }}?attributes=admin_router_id,passive_interfaces&depth=1
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  loop: "{{ _ospf_router_queries | default([]) }}"
  loop_control:
    label: "VRF {{ item.vrf }} process {{ item.process_id }}"
  register: _rest_ospf_router_results
  delegate_to: localhost
  when:
    - custom_fields.device_ospf | default(false) | bool
    - _ospf_router_queries | default([]) | length > 0
  tags:
    - always

- name: Query OSPF router areas from REST API
  ansible.builtin.uri:
    url: >-
      {{ _rest_api_base }}/system/vrfs/{{ item.vrf }}/ospf_routers/{{
      item.process_id }}/areas?depth=1
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  loop: "{{ _ospf_router_queries | default([]) }}"
  loop_control:
    label: "VRF {{ item.vrf }} process {{ item.process_id }}"
  register: _rest_ospf_router_areas_results
  delegate_to: localhost
  when:
    - custom_fields.device_ospf | default(false) | bool
    - _ospf_router_queries | default([]) | length > 0
  tags:
    - always

- name: Build OSPF router facts from REST API responses
  ansible.builtin.set_fact:
    aoscx_ospf_router_facts: >-
      {%- set result = {} -%}
      {%- for resp in _rest_ospf_router_results.results | default([]) -%}
        {%- if resp.status == 200 and resp.json is mapping -%}
          {%- set vrf = resp.item.vrf -%}
          {%- set pid = resp.item.process_id -%}
          {%- if vrf not in result -%}{%- set _ = result.update({vrf: {}}) -%}{%- endif -%}
          {%- set _ = result[vrf].update({pid: {
              'router_id': resp.json.admin_router_id | default(''),
              'areas': [],
              'passive_interfaces': (resp.json.passive_interfaces | default({})).keys() | list,
          }}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- for resp in _rest_ospf_router_areas_results.results | default([]) -%}
        {%- if resp.status == 200 and resp.json is mapping -%}
          {%- set vrf = resp.item.vrf -%}
          {%- set pid = resp.item.process_id -%}
          {%- if vrf in result and pid in result[vrf] -%}
            {%- set _ = result[vrf][pid].update({'areas': resp.json.keys() | list}) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%} {{ result }}
  when:
    - custom_fields.device_ospf | default(false) | bool
    - aoscx_configure_ospf | bool or aoscx_test_mode | bool
    - _rest_ospf_router_results is defined
  tags:
    - always

# Query DHCP relay facts (optional, when ip_helper_addresses is defined for the device)
# Used by interface change detection to determine if ip helper-address configuration
# has already been applied, avoiding unnecessary pushes. ip_helper_addresses is only
# ever pushed by configure_l3_interface_common.yml (gated on
# aoscx_configure_l3_interfaces), so skip the query when that flag is off unless
# aoscx_test_mode is set for report-only verification.
#
# Output: aoscx_dhcp_relay_facts = { interface_name: [server1, server2, ...] }
# Example: { "vlan101": ["172.16.3.10", "172.16.3.11"] }
- name: Query DHCP relay facts from REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/dhcp_relays?attributes=&depth=2"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  register: _rest_dhcp_relays
  delegate_to: localhost
  when:
    - ip_helper_addresses | default({}) | length > 0
    - aoscx_configure_l3_interfaces | bool or aoscx_test_mode | bool
  tags:
    - always

- name: Build DHCP relay facts from REST API response
  ansible.builtin.set_fact:
    aoscx_dhcp_relay_facts: "{{ _rest_dhcp_relays.json | rest_api_to_aoscx_dhcp_relays }}"
  when:
    - ip_helper_addresses | default({}) | length > 0
    - _rest_dhcp_relays is not skipped
    - _rest_dhcp_relays.status == 200
  tags:
    - always

# Query static route facts (optional, when static_routes config_context is defined)
# Used by configure_static_routes.yml to compute the create/update/delete diff,
# since the aoscx_static_route module is not idempotent (pyaoscx always deletes
# and recreates the nexthop). configure_static_routes.yml is only included when
# aoscx_configure_static_routes is true, so skip the query otherwise unless
# aoscx_test_mode is set for report-only verification.
#
# Queries one endpoint per VRF referenced in the static_routes config_context:
#   /system/vrfs/{vrf}/static_routes?attributes=&depth=4
#
# Output: aoscx_static_route_facts = { vrf: { prefix: {type, distance,
#         next_hop_ip_address, next_hop_interface} } }
# Only nexthop id "0" is read back (single next-hop per prefix, no ECMP).
- name: Query static route facts from REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/vrfs/{{ item }}/static_routes?attributes=&depth=4"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  loop: "{{ (static_routes | default({})).keys() | list }}"
  loop_control:
    label: "VRF {{ item }}"
  register: _rest_static_routes
  delegate_to: localhost
  when:
    - (static_routes | default({})) | length > 0
    - aoscx_configure_static_routes | bool or aoscx_test_mode | bool
  tags:
    - always

- name: Build static route facts from REST API responses
  ansible.builtin.set_fact:
    aoscx_static_route_facts: >-
      {%- set result = {} -%}
      {%- for resp in _rest_static_routes.results | default([]) -%}
        {%- if resp.status == 200 and resp.json is mapping -%}
          {%- set vrf_routes = {} -%}
          {%- for prefix, route_data in resp.json.items() -%}
            {%- set nexthops = route_data.static_nexthops | default({}) -%}
            {%- set nh = nexthops.get('0', {}) if nexthops is mapping else {} -%}
            {%- set port_dict = nh.port | default({}) -%}
            {%- set next_hop_interface = ((port_dict.keys() | list)[0]) if port_dict is mapping and port_dict | length > 0 else None -%}
            {%- set _ = vrf_routes.update({prefix: {
                'type': nh.type | default('forward'),
                'distance': nh.distance | default(1),
                'next_hop_ip_address': nh.ip_address | default(None),
                'next_hop_interface': next_hop_interface,
            }}) -%}
          {%- endfor -%}
          {%- set _ = result.update({resp.item: vrf_routes}) -%}
        {%- endif -%}
      {%- endfor -%} {{ result }}
  when:
    - (static_routes | default({})) | length > 0
    - aoscx_configure_static_routes | bool or aoscx_test_mode | bool
    - _rest_static_routes is defined
  tags:
    - always

# Build the list of VRFs in use up front - both the VRF and VRF
# route-target fact queries below need it. This step itself makes no API
# call, so it stays unconditional; the queries below are gated on
# aoscx_configure_vrfs / aoscx_test_mode.
- name: Build VRF list for fact gathering
  ansible.builtin.set_fact:
    _vrf_rt_vrf_names: "{{ (interfaces | default([]) | get_vrfs_in_use(ip_addresses | default([]))).vrf_names }}"
  tags:
    - always

# Query VRF existence/RD facts (optional, when VRFs are in use)
# Used by configure_vrfs.yml to skip creating VRFs that already exist and to
# skip pushing a Route Distinguisher that's already set to the desired
# value, instead of relying solely on aoscx_vrf's own idempotency and
# aoscx_config's match: line - matching the pre-compare-against-facts
# pattern used for L3 interfaces and static routes. configure_vrfs.yml is
# only included when aoscx_configure_vrfs is true, so skip the query
# otherwise unless aoscx_test_mode is set for report-only verification.
#
# Single collection query (no per-VRF loop needed, unlike vrf_address_families
# which is a per-VRF sub-resource):
#   /system/vrfs?attributes=name,rd&depth=2
#
# Uses depth=2, not depth=1: like the VLAN facts query above, depth=1 on a
# top-level collection GET only expands each entry into a URI string, not a
# full attribute object - depth=2 is needed to get real {"rd": ...} dicts
# per VRF. (An earlier attempt kept depth=1 and dropped the attributes
# filter, assuming the crash below was caused by a single-attribute
# collapse; it wasn't - actual_vrf was silently coerced from a URI string
# to {} by _to_dict(), masking the real depth bug and making every RD/RT
# always look mismatched even though the device already matched NetBox.)
#
# Output: aoscx_vrf_facts = { vrf_name: { 'rd': <str or None>, ... }, ... }
- name: Query VRF facts from REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/vrfs?attributes=name,rd&depth=2"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  register: _rest_vrfs
  delegate_to: localhost
  when:
    - _vrf_rt_vrf_names | default([]) | length > 0
    - aoscx_configure_vrfs | bool or aoscx_test_mode | bool
  tags:
    - always

- name: Build VRF facts from REST API response
  ansible.builtin.set_fact:
    aoscx_vrf_facts: "{{ _rest_vrfs.json | default({}) }}"
  when:
    - _rest_vrfs is defined
    - _rest_vrfs.status | default(0) == 200
  tags:
    - always

# Query VRF route-target facts (optional, when VRFs are in use)
# Used by configure_vrfs.yml to detect route-targets present on the device
# but no longer desired in NetBox, so they can be removed. Route-target
# pushes themselves stay idempotent via aoscx_config's match: line (it
# already skips lines that are already present) - these facts only close
# the "stale RT" gap, matching the cleanup pattern used for static routes.
# Gated on aoscx_configure_vrfs / aoscx_test_mode, same rationale as above.
#
# Queries one endpoint per VRF in use:
#   /system/vrfs/{vrf}/vrf_address_families?attributes=export_route_targets,import_route_targets&depth=2
#
# Uses depth=2, not depth=1: this is a collection GET (ipv4_unicast and
# ipv6_unicast entries) and needs the actual export/import_route_targets
# *values* nested inside each entry - depth=1 only expands each entry into
# a URI string (see the VLAN facts query and the VRF facts query above for
# the same distinction). Code elsewhere in this file that only needs a
# collection's *keys* (e.g. OSPF router areas/passive_interfaces below)
# stays correct at depth=1.
#
# Output: aoscx_vrf_rt_facts = { vrf: { 'ipv4': {'export': [...], 'import': [...]},
#                                       'ipv6': {'export': [...], 'import': [...]} } }
# AOS-CX address-family keys ipv4_unicast/ipv6_unicast are normalised to
# ipv4/ipv6 here to match the shape produced by build_vrf_rt_config.
- name: Query VRF route-target facts from REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/system/vrfs/{{ item }}/vrf_address_families?attributes=export_route_targets,import_route_targets&depth=2"
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 404]
    return_content: true
  loop: "{{ _vrf_rt_vrf_names | default([]) }}"
  loop_control:
    label: "VRF {{ item }}"
  register: _rest_vrf_rts
  delegate_to: localhost
  when:
    - _vrf_rt_vrf_names | default([]) | length > 0
    - aoscx_configure_vrfs | bool or aoscx_test_mode | bool
  tags:
    - always

- name: Build VRF route-target facts from REST API responses
  ansible.builtin.set_fact:
    aoscx_vrf_rt_facts: >-
      {%- set af_map = {'ipv4_unicast': 'ipv4', 'ipv6_unicast': 'ipv6'} -%}
      {%- set result = {} -%}
      {%- for resp in _rest_vrf_rts.results | default([]) -%}
        {%- if resp.status == 200 and resp.json is mapping -%}
          {%- set vrf_afs = {'ipv4': {'export': [], 'import': []}, 'ipv6': {'export': [], 'import': []}} -%}
          {%- for af_name, af_data in resp.json.items() -%}
            {%- if af_name in af_map -%}
              {%- set _ = vrf_afs.update({af_map[af_name]: {
                  'export': af_data.export_route_targets | default([]),
                  'import': af_data.import_route_targets | default([]),
              }}) -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set _ = result.update({resp.item: vrf_afs}) -%}
        {%- endif -%}
      {%- endfor -%} {{ result }}
  when:
    - _vrf_rt_vrf_names | default([]) | length > 0
    - aoscx_configure_vrfs | bool or aoscx_test_mode | bool
    - _rest_vrf_rts is defined
  tags:
    - always

# Logout to clean up session
- name: Logout from AOS-CX REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/logout"
    method: POST
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 204]
  delegate_to: localhost
  no_log: true
  tags:
    - always

# Store raw REST API response for enhanced facts (IPv6, VSX virtual IPs).
# Set in both full and enhanced-only modes.
- name: Store enhanced interface facts
  ansible.builtin.set_fact:
    aoscx_enhanced_interface_facts: "{{ _rest_interfaces.json }}"
  tags:
    - always

# Store raw VLAN facts including IGMP settings for intelligent configuration
- name: Store enhanced VLAN facts
  ansible.builtin.set_fact:
    aoscx_enhanced_vlan_facts: "{{ _rest_vlans.json }}"
  tags:
    - always

# Transform REST API responses to ansible_facts format.
# IMPORTANT: Do NOT set ansible_aoscx_rest_version here!
# pyaoscx modules require ansible_aoscx_rest_version: 10.09 (max supported).
# We use _rest_api_version separately for direct REST API calls.
- name: Set interface and VLAN facts from REST API response
  ansible.builtin.set_fact:
    ansible_facts:
      network_resources:
        interfaces: "{{ _rest_interfaces.json | rest_api_to_aoscx_interfaces }}"
        vlans: "{{ _rest_vlans.json | rest_api_to_aoscx_vlans }}"
  tags:
    - always

- name: Set EVPN facts from REST API response
  ansible.builtin.set_fact:
    aoscx_evpn_facts: "{{ _rest_evpn.json | default({}) }}"
    aoscx_evpn_vlans_facts: "{{ _rest_evpn_vlans.json | default({}) }}"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_configure_evpn | default(false) | bool or aoscx_test_mode | bool
    - _rest_evpn is defined
    - _rest_evpn.status | default(0) == 200
  tags:
    - always

- name: Set VNI facts from REST API response
  ansible.builtin.set_fact:
    aoscx_vni_facts: "{{ _rest_vnis.json | default({}) }}"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - aoscx_configure_vxlan | default(false) | bool or aoscx_test_mode | bool
    - _rest_vnis is defined
    - _rest_vnis.status | default(0) == 200
  tags:
    - always

- name: Set VSX facts from REST API response
  ansible.builtin.set_fact:
    aoscx_vsx_facts: "{{ _rest_vsx.json | default({}) }}"
  when:
    - custom_fields.device_vsx | default(false) | bool
    - _rest_vsx is defined
    - _rest_vsx.status | default(0) == 200
  tags:
    - always

- name: Set global STP facts from REST API response
  ansible.builtin.set_fact:
    aoscx_stp_global_facts: "{{ (_rest_stp_global.json | default({})).get('stp_config', {}) }}"
  when:
    - _rest_stp_global is defined
    - _rest_stp_global.status | default(0) == 200
  tags:
    - always

# Aggregate port-access facts. Only set when port-access fact gathering ran.
# The depth=4 device_profiles response is the single source - flatten it
# into {device_profiles, roles, lldp_groups, mac_groups} for the diff
# filter. When the endpoint returned non-200 (400/404 on firmware that
# doesn't expose it) the filter degrades to all-empty sub-dicts and
# port_access_diff falls back to "push everything".
- name: Set port-access facts from REST API response
  ansible.builtin.set_fact:
    aoscx_port_access_facts: >-
      {{ ((_rest_port_access_profiles.json | default({}))
            if (_rest_port_access_profiles is defined
                  and _rest_port_access_profiles.status == 200)
            else {})
         | port_access_facts_from_device_profiles }}
  when:
    - aoscx_configure_port_access | default(true) | bool or aoscx_test_mode | bool
    - (port_access | default({})) | length > 0
    - _rest_port_access_profiles is defined
  tags:
    - always

- name: Debug - Show REST API facts summary
  ansible.builtin.debug:
    msg: >-
      {{ [
        '=== REST API Fact Gathering Complete ===',
        'Interfaces found: ' ~ (ansible_facts.network_resources.interfaces | length),
        'VLANs found: ' ~ (ansible_facts.network_resources.vlans | length),
        'Enhanced interface facts: ' ~ (aoscx_enhanced_interface_facts | length),
        'Enhanced VLAN facts: ' ~ (aoscx_enhanced_vlan_facts | length),
        'EVPN facts available: ' ~ (aoscx_evpn_facts is defined),
        'VNI facts available: ' ~ (aoscx_vni_facts is defined),
        'VSX facts available: ' ~ (aoscx_vsx_facts is defined),
        'Port-access facts available: ' ~ (aoscx_port_access_facts is defined),
        'Static route facts available: ' ~ (aoscx_static_route_facts is defined),
        'VRF facts available: ' ~ (aoscx_vrf_facts is defined),
        'VRF route-target facts available: ' ~ (aoscx_vrf_rt_facts is defined)
      ] }}
  when:
    - aoscx_debug | default(false) | bool or ansible_verbosity >= 1
  tags:
    - always
