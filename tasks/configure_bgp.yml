---
# Configure BGP using the netbox-bgp plugin
#
# Data Source: netbox-bgp plugin (via pynetbox API)
# Set aoscx_use_netbox_bgp_plugin: false to disable BGP configuration entirely.
#
# Route Reflector Configuration:
# Automatically configured if device role is 'spine', 'route-reflector', or 'rr'.
# All BGP neighbors become RR clients.

- name: Get BGP sessions from NetBox BGP plugin
  when: aoscx_use_netbox_bgp_plugin | default(true) | bool
  delegate_to: localhost
  run_once: true
  block:
    - name: Query NetBox BGP plugin for all sessions
      ansible.builtin.uri:
        url: "{{ lookup('env', 'NETBOX_API') }}/api/plugins/bgp/session/"
        method: GET
        headers:
          Authorization: "Token {{ lookup('env', 'NETBOX_TOKEN') }}"
          Content-Type: "application/json"
        validate_certs: "{{ aoscx_netbox_validate_certs | default(true) }}"
        status_code: [200, 404]
        return_content: true
      register: netbox_bgp_sessions_raw
      no_log: "{{ aoscx_no_log | default(false) }}"

    - name: Set fact when BGP plugin is available
      ansible.builtin.set_fact:
        netbox_bgp_plugin_available: "{{ netbox_bgp_sessions_raw.status == 200 }}"
        netbox_bgp_sessions_all: "{{ netbox_bgp_sessions_raw.json.results | default([]) }}"
      run_once: true

    - name: Debug BGP plugin status
      ansible.builtin.debug:
        msg: "NetBox BGP plugin: {{ 'Available ✓' if netbox_bgp_plugin_available else 'Not available' }}"
      when: aoscx_debug | default(false) | bool

- name: Filter BGP sessions for this device from plugin
  ansible.builtin.set_fact:
    device_bgp_sessions: "{{ netbox_bgp_sessions_all |
      selectattr('device.name', 'equalto', inventory_hostname) |
      selectattr('status.value', 'in', ['active', 'planned']) |
      list }}"
  when:
    - netbox_bgp_plugin_available | default(false)
    - netbox_bgp_sessions_all is defined

# Derive VRF and address-family for each session by looking up the local IP
# on the device's interfaces (provided by the NetBox inventory plugin).
# Sessions on a non-default VRF interface are placed under 'bgp_vrf_sessions';
# all other sessions (loopbacks / default VRF) go to 'bgp_global_sessions'.
- name: Enrich BGP sessions with VRF and address-family info
  ansible.builtin.set_fact:
    device_bgp_sessions_enriched: >-
      {{ device_bgp_sessions | get_bgp_session_vrf_info(interfaces | default([])) }}
  when:
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0

- name: Split BGP sessions into global and VRF-specific groups
  ansible.builtin.set_fact:
    bgp_global_sessions: >-
      {{ device_bgp_sessions_enriched | selectattr('_vrf', 'equalto', 'default') | list }}
    bgp_vrf_sessions: >-
      {{ device_bgp_sessions_enriched | rejectattr('_vrf', 'equalto', 'default') | list }}
  when:
    - device_bgp_sessions_enriched is defined
    - device_bgp_sessions_enriched | length > 0

- name: Get BGP routing policy rules and prefix list rules from NetBox BGP plugin
  when:
    - aoscx_use_netbox_bgp_plugin | default(true) | bool
    - netbox_bgp_plugin_available | default(false)
    - bgp_vrf_sessions is defined
    - bgp_vrf_sessions | length > 0
  delegate_to: localhost
  run_once: true
  block:
    - name: Query NetBox BGP plugin for routing policy rules
      ansible.builtin.uri:
        url: "{{ lookup('env', 'NETBOX_API') }}/api/plugins/bgp/routing-policy-rule/"
        method: GET
        headers:
          Authorization: "Token {{ lookup('env', 'NETBOX_TOKEN') }}"
          Content-Type: "application/json"
        validate_certs: "{{ aoscx_netbox_validate_certs | default(true) }}"
        status_code: [200, 404]
        return_content: true
      register: netbox_policy_rules_raw
      no_log: "{{ aoscx_no_log | default(false) }}"

    - name: Query NetBox BGP plugin for prefix list rules
      ansible.builtin.uri:
        url: "{{ lookup('env', 'NETBOX_API') }}/api/plugins/bgp/prefix-list-rule/"
        method: GET
        headers:
          Authorization: "Token {{ lookup('env', 'NETBOX_TOKEN') }}"
          Content-Type: "application/json"
        validate_certs: "{{ aoscx_netbox_validate_certs | default(true) }}"
        status_code: [200, 404]
        return_content: true
      register: netbox_prefix_list_rules_raw
      no_log: "{{ aoscx_no_log | default(false) }}"

    - name: Set routing policy and prefix list facts
      ansible.builtin.set_fact:
        netbox_policy_rules_all: "{{ netbox_policy_rules_raw.json.results | default([]) }}"
        netbox_prefix_list_rules_all: "{{ netbox_prefix_list_rules_raw.json.results | default([]) }}"
      run_once: true

- name: Debug raw routing policy and prefix list rule data
  ansible.builtin.debug:
    msg:
      - "Policy rules count: {{ netbox_policy_rules_all | default([]) | length }}"
      - "Prefix list rules count: {{ netbox_prefix_list_rules_all | default([]) | length }}"
      - >-
        First policy rule keys: {{
          (netbox_policy_rules_all | default([]) | first).keys() | list
          if netbox_policy_rules_all | default([]) | length > 0
          else 'no rules'
        }}
      - "First policy rule: {{ netbox_policy_rules_all | default([]) | first | default('none') }}"
      - "First prefix list rule: {{ netbox_prefix_list_rules_all | default([]) | first | default('none') }}"
  when:
    - aoscx_debug | default(false) | bool
    - netbox_bgp_plugin_available | default(false)
    - netbox_policy_rules_all is defined or netbox_prefix_list_rules_all is defined

- name: Collect routing policy config data for eBGP VRF sessions
  ansible.builtin.set_fact:
    bgp_ebgp_policy_data: >-
      {{ bgp_vrf_sessions | default([]) |
         collect_ebgp_vrf_policy_config(
           netbox_policy_rules_all | default([]),
           netbox_prefix_list_rules_all | default([])
         ) }}
  when:
    - netbox_bgp_plugin_available | default(false)
    - bgp_vrf_sessions is defined
    - bgp_vrf_sessions | length > 0

- name: Debug BGP session VRF split
  ansible.builtin.debug:
    msg:
      - "Global BGP sessions (default VRF): {{ bgp_global_sessions | default([]) | length }}"
      - "VRF BGP sessions: {{ bgp_vrf_sessions | default([]) | length }}"
      - >-
        VRF sessions detail: {{
          bgp_vrf_sessions | default([]) |
          map('dict2items') |
          map('selectattr', 'key', 'in', ['name', '_vrf', '_af']) |
          list
        }}
  when: aoscx_debug | default(false) | bool

- name: Debug BGP configuration
  ansible.builtin.debug:
    msg:
      - "Device: {{ inventory_hostname }}"
      - "Plugin Sessions: {{ device_bgp_sessions | default([]) | length }}"
      - "Custom Field BGP Enabled: {{ custom_fields.device_bgp | default(false) }}"
      - "Custom Field Router ID: {{ custom_fields.device_bgp_routerid | default('not set') }}"
  when: aoscx_debug | default(false) | bool

# ============================================================================
# BGP Router Process Configuration
# ============================================================================

- name: Configure BGP router process from netbox-bgp plugin
  arubanetworks.aoscx.aoscx_config:
    lines:
      - router bgp {{ device_bgp_sessions[0].local_as.asn }}
      - bgp router-id {{ device_bgp_sessions[0].local_address.address.split('/')[0] }}
    match: line
  when:
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0
  vars:
    ansible_connection: network_cli

# ============================================================================
# BGP EVPN Neighbors Configuration
# ============================================================================

- name: Configure BGP EVPN neighbors from netbox-bgp plugin
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - neighbor {{ item.remote_address.address.split('/')[0] }} remote-as {{ item.remote_as.asn }}
      - neighbor {{ item.remote_address.address.split('/')[0] }} update-source {{ item.local_address.address.split('/')[0] }}
      - address-family l2vpn evpn
      - neighbor {{ item.remote_address.address.split('/')[0] }} send-community extended
      - neighbor {{ item.remote_address.address.split('/')[0] }} activate
      - exit-address-family
  loop: "{{ bgp_global_sessions | default(device_bgp_sessions) | default([]) }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} → {{ item.remote_address.address.split('/')[0] }} ({{ item.name }})"
  when:
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0
  vars:
    ansible_connection: network_cli

# ============================================================================
# BGP IPv4 Unicast Neighbors
# ============================================================================

- name: Configure BGP IPv4 unicast neighbors from netbox-bgp plugin
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - neighbor {{ item.remote_address.address.split('/')[0] }} remote-as {{ item.remote_as.asn }}
      - neighbor {{ item.remote_address.address.split('/')[0] }} update-source {{ item.local_address.address.split('/')[0] }}
      - address-family ipv4 unicast
      - neighbor {{ item.remote_address.address.split('/')[0] }} activate
      - exit-address-family
  loop: "{{ bgp_global_sessions | default(device_bgp_sessions) | default([]) }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} → {{ item.remote_address.address.split('/')[0] }} ({{ item.name }})"
  when:
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0
    - bgp_ipv4_enabled | default(false) | bool
  vars:
    ansible_connection: network_cli

# ============================================================================
# BGP Routing Policies and Prefix Lists (from netbox-bgp plugin, IPv4 only)
# ============================================================================
# Prefix lists and route-maps are global (not VRF-scoped) on AOS-CX.
# They must be configured before any BGP neighbor or VRF statements
# that reference them.

- name: Configure IPv4 prefix lists for eBGP VRF sessions
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - >-
        ip prefix-list {{ item.0.name }}
        seq {{ item.1.index }}
        {{ item.1.action }}
        {{ item.1.prefix }}
      - end
  loop: "{{ bgp_ebgp_policy_data.prefix_lists | default([]) | subelements('rules') }}"
  loop_control:
    label: >-
      {{ item.0.name }} seq {{ item.1.index }}
      {{ item.1.action }} {{ item.1.prefix }}
  when:
    - netbox_bgp_plugin_available | default(false)
    - bgp_ebgp_policy_data is defined
    - bgp_ebgp_policy_data.prefix_lists | default([]) | length > 0
  vars:
    ansible_connection: network_cli

- name: Configure route-map rules for eBGP VRF sessions
  arubanetworks.aoscx.aoscx_config:
    lines: "{{ item.commands[1:] }}"
    parents: "{{ item.commands[0] }}"
    match: line
  loop: "{{ bgp_ebgp_policy_data.route_map_rules | default([]) }}"
  loop_control:
    label: "route-map {{ item.name }} {{ item.action }} seq {{ item.index }}"
  when:
    - netbox_bgp_plugin_available | default(false)
    - bgp_ebgp_policy_data is defined
    - bgp_ebgp_policy_data.route_map_rules | default([]) | length > 0
  vars:
    ansible_connection: network_cli

# ============================================================================
# BGP VRF Neighbors (from netbox-bgp plugin)
# ============================================================================
# Sessions whose local_address is assigned to an interface in a non-default VRF
# are configured here under the matching VRF context inside 'router bgp'.
#
# The VRF and address-family are derived automatically:
#   local_address IP → interface in NetBox → interface VRF
#   IPv4 address → address-family ipv4 unicast
#   IPv6 address → address-family ipv6 unicast

- name: Configure BGP VRF iBGP neighbors from netbox-bgp plugin (with next-hop-self)
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - vrf {{ item._vrf }}
      - neighbor {{ item.remote_address.address.split('/')[0] }} remote-as {{ item.remote_as.asn }}
      - address-family {{ item._af }} unicast
      - neighbor {{ item.remote_address.address.split('/')[0] }} next-hop-self
      - neighbor {{ item.remote_address.address.split('/')[0] }} send-community extended
      - neighbor {{ item.remote_address.address.split('/')[0] }} activate
      - exit-address-family
      - exit-vrf
  loop: "{{ bgp_vrf_sessions | default([]) }}"
  loop_control:
    label: >-
      Device: {{ inventory_hostname }}
      VRF: {{ item._vrf }} ({{ item._af }})
      → {{ item.remote_address.address.split('/')[0] }} ({{ item.name }}) [iBGP]
  when:
    - netbox_bgp_plugin_available | default(false)
    - bgp_vrf_sessions is defined
    - bgp_vrf_sessions | length > 0
    - item.local_as.asn == item.remote_as.asn
  vars:
    ansible_connection: network_cli

- name: Configure BGP VRF eBGP neighbors from netbox-bgp plugin
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - vrf {{ item._vrf }}
      - neighbor {{ item.remote_address.address.split('/')[0] }} remote-as {{ item.remote_as.asn }}
      - address-family {{ item._af }} unicast
      - neighbor {{ item.remote_address.address.split('/')[0] }} send-community extended
      - neighbor {{ item.remote_address.address.split('/')[0] }} activate
      - exit-address-family
      - exit-vrf
  loop: "{{ bgp_vrf_sessions | default([]) }}"
  loop_control:
    label: >-
      Device: {{ inventory_hostname }}
      VRF: {{ item._vrf }} ({{ item._af }})
      → {{ item.remote_address.address.split('/')[0] }} ({{ item.name }}) [eBGP]
  when:
    - netbox_bgp_plugin_available | default(false)
    - bgp_vrf_sessions is defined
    - bgp_vrf_sessions | length > 0
    - item.local_as.asn != item.remote_as.asn
  vars:
    ansible_connection: network_cli

- name: Apply export route-maps to eBGP VRF IPv4 neighbors
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - vrf {{ item._vrf }}
      - address-family ipv4 unicast
      - >-
        neighbor {{ item.remote_address.address.split('/')[0] }}
        route-map {{ item.export_policies[0].name }} out
      - exit-address-family
      - exit-vrf
  loop: "{{ bgp_vrf_sessions | default([]) }}"
  loop_control:
    label: >-
      Device: {{ inventory_hostname }}
      VRF: {{ item._vrf }}
      → {{ item.remote_address.address.split('/')[0] }}
      export: {{ (item.export_policies | default([]))[0].name if item.export_policies | default([]) | length > 0 else 'n/a' }}
  when:
    - netbox_bgp_plugin_available | default(false)
    - bgp_vrf_sessions is defined
    - bgp_vrf_sessions | length > 0
    - item.local_as.asn != item.remote_as.asn
    - item._af == 'ipv4'
    - item.export_policies | default([]) | length > 0
  vars:
    ansible_connection: network_cli

- name: Apply import route-maps to eBGP VRF IPv4 neighbors
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - vrf {{ item._vrf }}
      - address-family ipv4 unicast
      - >-
        neighbor {{ item.remote_address.address.split('/')[0] }}
        route-map {{ item.import_policies[0].name }} in
      - exit-address-family
      - exit-vrf
  loop: "{{ bgp_vrf_sessions | default([]) }}"
  loop_control:
    label: >-
      Device: {{ inventory_hostname }}
      VRF: {{ item._vrf }}
      → {{ item.remote_address.address.split('/')[0] }}
      import: {{ (item.import_policies | default([]))[0].name if item.import_policies | default([]) | length > 0 else 'n/a' }}
  when:
    - netbox_bgp_plugin_available | default(false)
    - bgp_vrf_sessions is defined
    - bgp_vrf_sessions | length > 0
    - item.local_as.asn != item.remote_as.asn
    - item._af == 'ipv4'
    - item.import_policies | default([]) | length > 0
  vars:
    ansible_connection: network_cli

# ============================================================================
# BGP Route Reflector Settings
# ============================================================================
# If device role is "spine", automatically configure all BGP neighbors as
# route-reflector clients. This is common in spine-leaf EVPN architectures.

- name: Configure BGP route reflector settings from netbox-bgp plugin (spine role)
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - address-family l2vpn evpn
      - neighbor {{ item.remote_address.address.split('/')[0] }} route-reflector-client
      - exit-address-family
  loop: "{{ device_bgp_sessions | default([]) }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} RR Client: {{ item.remote_address.address.split('/')[0] }}"
  when:
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0
    - role | default('') | lower in ['spine', 'route-reflector', 'rr']
  vars:
    ansible_connection: network_cli

- name: Configure BGP IPv4 unicast route reflector settings from netbox-bgp plugin (spine role)
  arubanetworks.aoscx.aoscx_command:
    commands:
      - configure terminal
      - router bgp {{ item.local_as.asn }}
      - address-family ipv4 unicast
      - neighbor {{ item.remote_address.address.split('/')[0] }} route-reflector-client
      - exit-address-family
  loop: "{{ device_bgp_sessions | default([]) }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} RR Client: {{ item.remote_address.address.split('/')[0] }}"
  when:
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0
    - role | default('') | lower in ['spine', 'route-reflector', 'rr']
    - bgp_ipv4_enabled | default(false) | bool
  vars:
    ansible_connection: network_cli

# ============================================================================
# BGP Stale Neighbor Cleanup (idempotent mode)
# ============================================================================
# Removes BGP neighbors present on the device but absent from NetBox.
# Only runs when aoscx_idempotent_mode is true and the NetBox BGP plugin is
# available.  Uses the REST API to read the current device neighbor table and
# compares it per-VRF against the desired set from NetBox.

- name: Remove stale BGP neighbors (idempotent mode)
  when:
    - aoscx_idempotent_mode | default(false) | bool
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0
    - device_bgp_sessions_enriched is defined
  block:
    - name: Set BGP cleanup REST API connection variables
      ansible.builtin.set_fact:
        _bgp_rest_host: "{{ aoscx_rest_host | default(ansible_host) }}"
        _bgp_rest_user: "{{ aoscx_rest_user | default(ansible_user) }}"
        _bgp_rest_password: "{{ aoscx_rest_password | default(ansible_password) }}"
        _bgp_rest_validate_certs: "{{ aoscx_rest_validate_certs | default(false) }}"
        _bgp_rest_api_base: >-
          https://{{ aoscx_rest_host | default(ansible_host)
          }}/rest/v{{ _rest_api_version | default('10.15') }}
      no_log: true

    - name: Login to AOS-CX REST API for BGP cleanup
      ansible.builtin.uri:
        url: "{{ _bgp_rest_api_base }}/login"
        method: POST
        body_format: form-urlencoded
        body:
          username: "{{ _bgp_rest_user }}"
          password: "{{ _bgp_rest_password }}"
        validate_certs: "{{ _bgp_rest_validate_certs }}"
        status_code: [200]
      register: _bgp_rest_login
      delegate_to: localhost
      no_log: "{{ aoscx_no_log | default(true) }}"

    # Build the list of VRFs to check: always include default, plus any custom
    # VRFs referenced by bgp_vrf_sessions.
    - name: Build list of BGP VRFs and local ASN for cleanup queries
      ansible.builtin.set_fact:
        _bgp_local_asn: "{{ device_bgp_sessions[0].local_as.asn }}"
        _bgp_vrfs_to_check: >-
          {{ ['default']
             + (bgp_vrf_sessions | default([]) | map(attribute='_vrf') | unique | list) }}

    # Query each VRF's BGP neighbor table.  404 means the BGP router / VRF
    # does not exist on the device for that ASN — those are skipped silently.
    - name: Query device BGP neighbors per VRF via REST API
      ansible.builtin.uri:
        url: >-
          {{ _bgp_rest_api_base }}/system/vrfs/{{ item
          }}/bgp_routers/{{ _bgp_local_asn }}/bgp_neighbors?depth=1
        method: GET
        headers:
          Cookie: "{{ _bgp_rest_login.cookies_string }}"
        validate_certs: "{{ _bgp_rest_validate_certs }}"
        status_code: [200, 404]
        return_content: true
      loop: "{{ _bgp_vrfs_to_check }}"
      loop_control:
        label: "VRF: {{ item }}"
      register: _bgp_device_neighbors_raw
      delegate_to: localhost

    - name: Logout from AOS-CX REST API after BGP neighbor query
      ansible.builtin.uri:
        url: "{{ _bgp_rest_api_base }}/logout"
        method: POST
        headers:
          Cookie: "{{ _bgp_rest_login.cookies_string }}"
        validate_certs: "{{ _bgp_rest_validate_certs }}"
        status_code: [200, 204]
      delegate_to: localhost
      no_log: true

    # For each VRF, compare device neighbors against NetBox-desired neighbors
    # (i.e., remote_address IPs from sessions enriched with the same _vrf).
    # Sessions in the default VRF use _vrf == 'default'.
    - name: Identify stale BGP neighbors to remove
      ansible.builtin.set_fact:
        _bgp_stale_neighbors: >-
          {%- set stale = [] -%}
          {%- set enriched = device_bgp_sessions_enriched | default([]) -%}
          {%- for resp in _bgp_device_neighbors_raw.results | default([]) -%}
            {%- if resp.status == 200 and resp.json is mapping -%}
              {%- set vrf = resp.item -%}
              {%- set desired_ips = enriched
                  | selectattr('_vrf', 'defined')
                  | selectattr('_vrf', 'equalto', vrf)
                  | map(attribute='remote_address')
                  | map(attribute='address')
                  | map('regex_replace', '/.*$', '')
                  | list -%}
              {%- for neighbor_ip in resp.json.keys() -%}
                {%- if neighbor_ip not in desired_ips -%}
                  {%- set _ = stale.append({
                        'vrf': vrf,
                        'ip': neighbor_ip,
                        'asn': _bgp_local_asn | string
                     }) -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}
          {{ stale }}

    - name: Debug stale BGP neighbors
      ansible.builtin.debug:
        msg:
          - "VRFs checked: {{ _bgp_vrfs_to_check }}"
          - "Stale BGP neighbors to remove: {{ _bgp_stale_neighbors }}"
      when: aoscx_debug | default(false) | bool

    - name: Remove stale BGP neighbors from device
      arubanetworks.aoscx.aoscx_command:
        commands: >-
          {{ ['configure terminal', 'router bgp ' ~ item.asn]
             + (['vrf ' ~ item.vrf] if item.vrf != 'default' else [])
             + ['no neighbor ' ~ item.ip]
             + (['exit-vrf'] if item.vrf != 'default' else []) }}
      loop: "{{ _bgp_stale_neighbors }}"
      loop_control:
        label: "VRF {{ item.vrf }}: no neighbor {{ item.ip }}"
      when: _bgp_stale_neighbors | length > 0
      vars:
        ansible_connection: network_cli

# ============================================================================
# Configuration Summary
# ============================================================================

- name: Display BGP configuration summary
  ansible.builtin.debug:
    msg:
      - "=== BGP Configuration (netbox-bgp plugin) ==="
      - "Device: {{ inventory_hostname }}"
      - "Device Role: {{ role | default('not set') }}"
      - "Local AS: {{ device_bgp_sessions[0].local_as.asn }}"
      - "Router ID: {{ device_bgp_sessions[0].local_address.address.split('/')[0] }}"
      - "Total Sessions: {{ device_bgp_sessions | length }}"
      - "Global Sessions (EVPN/default VRF): {{ bgp_global_sessions | default([]) | length }}"
      - "VRF Sessions: {{ bgp_vrf_sessions | default([]) | length }}"
      - "Active Sessions: {{ device_bgp_sessions | selectattr('status.value', 'equalto', 'active') | list | length }}"
      - "Planned Sessions: {{ device_bgp_sessions | selectattr('status.value', 'equalto', 'planned') | list | length }}"
      - "Route Reflector: {{ 'Yes (all neighbors are RR clients)' if (role | default('') | lower in ['spine', 'route-reflector', 'rr']) else 'No' }}"
  when:
    - aoscx_debug | default(false) | bool
    - netbox_bgp_plugin_available | default(false)
    - device_bgp_sessions is defined
    - device_bgp_sessions | length > 0
