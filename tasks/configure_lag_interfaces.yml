---
# Configure LAG interfaces - interface creation, description, enable/disable, LACP
# This must be run before L2/L3 configuration and before assigning physical interfaces to LAG

# Verify that interface analysis has been performed
- name: configure_lag_interfaces | Verify interface analysis has been performed
  ansible.builtin.assert:
    that:
      - interface_changes is defined
      - interface_changes.lag is defined
    fail_msg: "ERROR: identify_interface_changes.yml must run before configure_lag_interfaces.yml"
    success_msg: "Interface analysis completed - proceeding with LAG interface configuration"
  tags:
    - always

- name: configure_lag_interfaces | Debug LAG interfaces to configure (only those needing changes)
  ansible.builtin.debug:
    msg:
      - "Configuring LAG interfaces (excluding MCLAG)"
      - "Total LAGs from NetBox: {{ interfaces | selectattr('type', 'defined') | selectattr('type', 'match', '.*lag.*') | rejectattr('custom_fields.if_mclag', 'defined') | list | length + interfaces | selectattr('type', 'defined') | selectattr('type', 'match', '.*lag.*') | selectattr('custom_fields.if_mclag', 'defined') | rejectattr('custom_fields.if_mclag') | list | length }}"
      - "LAGs needing changes: {{ interface_changes.lag | default([]) | length }}"
      - "LAGs needing changes: {{ interface_changes.lag | default([]) | map(attribute='name') | list }}"
  when: aoscx_debug | bool

# Create LAG interfaces and set basic configuration (only those needing changes)
- name: configure_lag_interfaces | Configure LAG interface description (only those needing changes)
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }}
    lines:
      - description {{ item.description | default('') }}
    match: line
  loop: "{{ interface_changes.lag | default([]) }}"
  loop_control:
    label: "Interface: {{ item.name }} - Description: {{ item.description | default('(none)') }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - item.description is defined
    - item.description != ""
    - not (item.custom_fields.if_mclag | default(false))
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

# Enable LAG interfaces (no shutdown, only those needing changes)
- name: configure_lag_interfaces | Configure LAG interface enable (no shutdown, only those needing changes)
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }}
    lines:
      - no shutdown
    match: line
  loop: "{{ interface_changes.lag | default([]) }}"
  loop_control:
    label: "Interface: {{ item.name }} - Enabled: {{ item.enabled | default(true) }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - item.enabled | default(true)
    - not (item.custom_fields.if_mclag | default(false))
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

# Disable LAG interfaces (shutdown, only those needing changes)
- name: configure_lag_interfaces | Configure LAG interface disable (shutdown, only those needing changes)
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }}
    lines:
      - shutdown
    match: line
  loop: "{{ interface_changes.lag | default([]) }}"
  loop_control:
    label: "Interface: {{ item.name }} - Enabled: {{ item.enabled | default(true) }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - not (item.enabled | default(true))
    - not (item.custom_fields.if_mclag | default(false))
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

# Configure LACP mode active on LAG interfaces (only those needing changes)
- name: configure_lag_interfaces | Configure LAG LACP mode active (only those needing changes)
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface {{ item.name | replace("lag", "lag ") }}
    lines:
      - lacp mode active
    match: line
  loop: "{{ interface_changes.lag | default([]) }}"
  loop_control:
    label: "Interface: {{ item.name }} - LACP: {{ item.custom_fields.if_lacp | default(false) }}"
  when:
    - (item.type.value is defined and item.type.value == 'lag') or (item.type.value is not defined and item.type == 'lag')
    - item.custom_fields.if_lacp | default(false)
    - not (item.custom_fields.if_mclag | default(false))
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

- name: configure_lag_interfaces | LAG configuration summary
  ansible.builtin.debug:
    msg:
      - "LAG Configuration Summary:"
      - "Regular LAG interfaces configured"
      - "Physical interfaces in LAG: {{ interfaces | selectattr('lag', 'defined') | selectattr('lag', '!=', none) | list | length }}"
  when: aoscx_debug | bool
