---
# Configure L3 interfaces with IP addresses

# Verify that interface analysis has been performed
- name: configure_l3_interfaces | Verify interface analysis has been performed
  ansible.builtin.assert:
    that:
      - interface_changes is defined
      - interface_changes.l3 is defined
    fail_msg: "ERROR: identify_interface_changes.yml must run before configure_l3_interfaces.yml"
    success_msg: "Interface analysis completed - proceeding with L3 interface configuration"
  tags:
    - always

- name: Extract interfaces for L3 configuration (only those needing changes)
  ansible.builtin.set_fact:
    interfaces_with_ips: "{{ interface_changes.l3 | default([]) | selectattr('ip_addresses', 'defined') | selectattr('ip_addresses', '!=', []) | list }}"

- name: Debug - Show interfaces with IPs (only those needing changes)
  ansible.builtin.debug:
    msg:
      - "Total L3 interfaces from NetBox: {{ interfaces | selectattr('ip_addresses', 'defined') | selectattr('ip_addresses', '!=', []) | list | length }}"
      - "L3 interfaces needing configuration changes: {{ interfaces_with_ips | length }}"
      - >-
        L3 interfaces NOT needing changes (skipped):
        {{ (interfaces | selectattr('ip_addresses', 'defined')
        | selectattr('ip_addresses', '!=', []) | list | length)
        - (interfaces_with_ips | length) }}
      - "Sample interfaces with changes: {{ interfaces_with_ips[:3] | map(attribute='name') | list }}"
  when:
    - aoscx_debug | bool or ansible_verbosity >= 1

- name: Flatten interface/IP combinations
  ansible.builtin.set_fact:
    interface_ips: >-
      {{
        interfaces_with_ips | map('combine', {'_ip_list': []}) | list |
        map('combine', {
          '_ip_list': interfaces_with_ips |
            selectattr('ip_addresses', 'defined') |
            map(attribute='ip_addresses') |
            flatten
        })
      }}

# Actually, let's use a simpler approach with a loop
- name: Build interface IP address list
  ansible.builtin.set_fact:
    interface_ips: []

- name: Process each interface with IPs
  ansible.builtin.set_fact:
    interface_ips: "{{ interface_ips + [item_combo] }}"
  vars:
    item_combo:
      interface: "{{ item.0 }}"
      interface_name: "{{ item.0.name }}"
      interface_type: "{{ item.0.type.value if item.0.type is defined and item.0.type.value is defined else 'unknown' }}"
      address: "{{ item.1.address }}"
      vrf: "{{ item.1.vrf.name if item.1.vrf is defined and item.1.vrf.name is defined else 'default' }}"
      description: "{{ item.0.description | default('') }}"
      enabled: "{{ item.0.enabled | default(true) }}"
      # IP address role (e.g., "anycast")
      ip_role: "{{ item.1.role.value if item.1.role is defined and item.1.role.value is defined else none }}"
      # Anycast gateway MAC from interface custom fields
      anycast_mac: "{{
        item.0.custom_fields.if_anycast_gateway_mac
        if item.0.custom_fields is defined
        and item.0.custom_fields.if_anycast_gateway_mac is defined
        else none }}"
      # Track if this specific IP needs to be added (for performance optimization)
      # IPv4 Logic:
      #   1. If ipv4_to_add exists: Check if address is in list
      #   2. If _ip_changes exists but no ipv4_to_add: FALSE (checked, no changes needed)
      #   3. If no _ip_changes at all: TRUE (new interface, needs config)
      # IPv6 Logic:
      #   1. If ipv6_to_add exists (from enhanced facts): Check if address is in list
      #   2. If _ip_changes exists but no ipv6_to_add: TRUE (no enhanced facts, configure all)
      #   3. If no _ip_changes at all: TRUE (new interface, needs config)
      _needs_add: >-
        {{
          item.1.address in item.0._ip_changes.ipv4_to_add
          if (':' not in item.1.address and item.0._ip_changes is defined and 'ipv4_to_add' in item.0._ip_changes)
          else (
            false
            if (':' not in item.1.address and item.0._ip_changes is defined)
            else (
              item.1.address in item.0._ip_changes.ipv6_to_add
              if (':' in item.1.address and item.0._ip_changes is defined and 'ipv6_to_add' in item.0._ip_changes)
              else true
            )
          )
        }}
  loop: "{{ interfaces_with_ips | subelements('ip_addresses', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} - {{ item.1.address }}"

- name: Debug - Show processed interface IPs
  ansible.builtin.debug:
    msg:
      - "Total interface/IP combinations: {{ interface_ips | length }}"
      - "Sample: {{ interface_ips[:3] }}"
      - "Interface 1/1/5 data: {{ interface_ips | selectattr('interface_name', 'equalto', '1/1/5') | list }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Debug - Show IPv6 change detection results
  ansible.builtin.debug:
    msg:
      - "=== IPv6 Change Detection Debug ==="
      - "REST API facts enabled: {{ aoscx_gather_facts_rest_api | default(false) }}"
      - "IPv6 addresses in list: {{ interface_ips | selectattr('address', 'search', ':') | list | length }}"
      - >-
        IPv6 addresses with _needs_add=true:
        {{ interface_ips | selectattr('address', 'search', ':')
        | selectattr('_needs_add', 'equalto', true) | list | length }}
      - >-
        IPv6 addresses with _needs_add=false:
        {{ interface_ips | selectattr('address', 'search', ':')
        | selectattr('_needs_add', 'equalto', false) | list | length }}
      - >-
        Sample IPv6 with _needs_add=true:
        {{ (interface_ips | selectattr('address', 'search', ':')
        | selectattr('_needs_add', 'equalto', true) | list)[:3]
        | map(attribute='address') | list }}
      - "Sample IPv6 _ip_changes: {{ (interfaces_with_ips | selectattr('_ip_changes', 'defined') | list)[:1] | map(attribute='_ip_changes') | list }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Get VLAN interfaces (from interfaces needing changes only)
  ansible.builtin.set_fact:
    vlan_interfaces: "{{ interfaces_with_ips | get_vlan_interfaces }}"

- name: Debug - Show VLAN interfaces
  ansible.builtin.debug:
    msg:
      - "VLAN interfaces needing configuration: {{ vlan_interfaces | length }}"
      - "VLAN interface names: {{ vlan_interfaces | map(attribute='name') | list }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Create VLAN interfaces (SVIs) that need configuration
  arubanetworks.aoscx.aoscx_interface:
    name: "{{ item.name }}"
    enabled: "{{ item.enabled }}"
    description: "{{ item.description | default(omit) }}"
    state: create
  loop: "{{ vlan_interfaces }}"
  loop_control:
    label: "Interface: {{ item.name }}"
  when:
    - vlan_interfaces | length > 0
    - item.name not in (ansible_facts.network_resources.interfaces.keys() | list if ansible_facts.network_resources.interfaces is defined else [])

- name: Categorize L3 interfaces
  ansible.builtin.set_fact:
    l3_interfaces: "{{ interface_ips | categorize_l3_interfaces }}"

- name: Debug - Show L3 categorization
  ansible.builtin.debug:
    msg:
      - "Physical (default VRF): {{ l3_interfaces.physical_default_vrf | length }}"
      - "Physical (custom VRF): {{ l3_interfaces.physical_custom_vrf | length }}"
      - "Physical (custom VRF) details: {{ l3_interfaces.physical_custom_vrf | map(attribute='interface_name') | list }}"
      - "VLAN (default VRF): {{ l3_interfaces.vlan_default_vrf | length }}"
      - "VLAN (custom VRF): {{ l3_interfaces.vlan_custom_vrf | length }}"
      - "LAG (default VRF): {{ l3_interfaces.lag_default_vrf | length }}"
      - "LAG (custom VRF): {{ l3_interfaces.lag_custom_vrf | length }}"
      - "Sub-interface (default VRF): {{ l3_interfaces.subinterface_default_vrf | length }}"
      - "Sub-interface (custom VRF): {{ l3_interfaces.subinterface_custom_vrf | length }}"
      - "Loopback: {{ l3_interfaces.loopback | length }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Create loopback interfaces that need configuration
  arubanetworks.aoscx.aoscx_interface:
    name: "{{ item }}"
    state: create
  loop: "{{ l3_interfaces.loopback | map(attribute='interface_name') | unique | list }}"
  loop_control:
    label: "Interface: {{ item }}"
  when: l3_interfaces.loopback | length > 0

# Build a preview of config lines per interface before applying changes.
# Uses group_interface_ips to group per-IP items by interface and filter
# to _needs_add=true, then calls build_l3_config_lines once per interface.
- name: Build L3 config lines preview
  ansible.builtin.set_fact:
    _l3_config_preview: >-
      {%- set result = {} -%}
      {%- set categories = [
        (l3_interfaces.physical_default_vrf,    'physical',     'default'),
        (l3_interfaces.physical_custom_vrf,     'physical',     'custom'),
        (l3_interfaces.vlan_default_vrf,        'vlan',         'default'),
        (l3_interfaces.vlan_custom_vrf,         'vlan',         'custom'),
        (l3_interfaces.lag_default_vrf,         'lag',          'default'),
        (l3_interfaces.lag_custom_vrf,          'lag',          'custom'),
        (l3_interfaces.subinterface_default_vrf,'subinterface', 'default'),
        (l3_interfaces.subinterface_custom_vrf, 'subinterface', 'custom'),
        (l3_interfaces.loopback | selectattr('vrf', 'in', aoscx_builtin_vrfs + [none]) | list, 'loopback', 'default'),
        (l3_interfaces.loopback | rejectattr('vrf', 'in', aoscx_builtin_vrfs + [none]) | list, 'loopback', 'custom')
      ] -%}
      {%- for items, itype, vrf in categories -%}
        {%- for item in items | group_interface_ips -%}
          {%- set lines = item | build_l3_config_lines(itype, vrf, aoscx_l3_counters_enable | default(true), ospf_process_id | default(1)) -%}
          {%- set iname = item.interface_name | format_interface_name(itype) -%}
          {%- set _ = result.update({iname: lines}) -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ result }}
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Debug - Show L3 config lines to be applied
  ansible.builtin.debug:
    msg: >-
      {%- set lines = [] -%}
      {%- for iname, config_lines in (_l3_config_preview | default({})).items() | sort -%}
        {%- set _ = lines.append('interface ' ~ iname ~ ':') -%}
        {%- for line in config_lines -%}
          {%- set _ = lines.append('  ' ~ line) -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ ['=== L3 Config Lines Preview ==='] + (lines if lines else ['(no changes needed)']) }}
  when: aoscx_debug | bool or ansible_verbosity >= 1

# Configure missing 'ipv6 address link-local' for link-local anycast gateways.
# HPE Aruba requires this command when using a link-local address as active-gateway IPv6.
# This runs before the main L3 config to ensure the link-local is present before
# active-gateway commands are applied on new interfaces.
- name: Configure missing IPv6 link-local addresses for anycast gateways
  arubanetworks.aoscx.aoscx_config:
    lines: >-
      {{
        item._ip_changes.link_local_ipv6_to_add
        | map('regex_replace', '^(.*)$', 'ipv6 address link-local \1') | list
      }}
    parents: >-
      interface {{ item.name | format_interface_name(
        'lag' if (item.type is defined and item.type.value is defined and item.type.value == 'lag')
        else ('loopback' if 'loopback' in item.name.lower() else 'physical')
      ) }}
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"
  loop: "{{ interface_changes.l3 | default([]) }}"
  loop_control:
    label: "Interface: {{ item.name }} link-local: {{ item._ip_changes.link_local_ipv6_to_add | default([]) }}"
  when: >-
    (item._ip_changes is defined) and
    (item._ip_changes.link_local_ipv6_to_add | default([]) | length > 0)

# Remove stale anycast gateways (configured on device but no longer in NetBox)
- name: Remove stale anycast gateways
  arubanetworks.aoscx.aoscx_config:
    lines: >-
      {{
        (item._ip_changes.anycast_ipv4_to_remove | default([])
          | map('regex_replace', '^(.*)$', 'no active-gateway ip \1') | list)
        + (item._ip_changes.anycast_ipv6_to_remove | default([])
          | map('regex_replace', '^(.*)$', 'no active-gateway ipv6 \1') | list)
      }}
    parents: >-
      interface {{ item.name | format_interface_name(
        'lag' if (item.type is defined and item.type.value is defined and item.type.value == 'lag')
        else ('loopback' if 'loopback' in item.name.lower() else 'physical')
      ) }}
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"
  loop: "{{ interface_changes.l3 | default([]) }}"
  loop_control:
    label: "Interface: {{ item.name }}"
  when: >-
    (item._ip_changes is defined) and
    ((item._ip_changes.anycast_ipv4_to_remove | default([]) | length > 0) or
     (item._ip_changes.anycast_ipv6_to_remove | default([]) | length > 0))

# Configure physical interfaces
- name: Include physical L3 interface configuration
  ansible.builtin.include_tasks: configure_l3_physical.yml

# Configure sub-interfaces
- name: Include sub-interface L3 configuration
  ansible.builtin.include_tasks: configure_l3_subinterface.yml

# Configure VLAN interfaces
- name: Include VLAN L3 interface configuration
  ansible.builtin.include_tasks: configure_l3_vlan.yml

# Configure LAG interfaces
- name: Include LAG L3 interface configuration
  ansible.builtin.include_tasks: configure_l3_lag.yml

# Configure loopback interfaces
- name: Include loopback interface configuration
  ansible.builtin.include_tasks: configure_l3_loopback.yml
