---
# Configure OSPF on AOS-CX switches
#
# Depends on: identify_ospf_changes.yml (included just before this file in
# tasks/main.yml), which sets ospf_config, _ospf_interface_items,
# ospf_router_changes, and ospf_interface_changes - the categorized
# router/area/interface diff against device state.
#
# When aoscx_ospf_router_facts/aoscx_ospf_interface_facts are unavailable
# (REST API fact gathering disabled, or custom_fields.device_ospf not set),
# ospf_router_changes/ospf_interface_changes contain every desired
# router/area/interface setting (push everything, let aoscx_ospf_router/
# aoscx_ospf_area's own idempotency and aoscx_config's line-matching handle
# it) - same convention as VRF change handling.

- name: Configure OSPF router instance for each VRF
  arubanetworks.aoscx.aoscx_ospf_router:
    vrf: "{{ item.vrf }}"
    instance_tag: "{{ ospf_config.process_id }}"
    admin_router_id: "{{ ospf_config.router_id }}"
  loop: "{{ ospf_router_changes.router_changes }}"
  loop_control:
    label: "VRF: {{ item.vrf }}"
  when:
    - ospf_config.router_id is defined
    - ospf_config.router_id | length > 0
    - ospf_router_changes.router_changes | length > 0

- name: Configure OSPF areas for each VRF
  arubanetworks.aoscx.aoscx_ospf_area:
    vrf: "{{ item.vrf }}"
    ospf_id: "{{ ospf_config.process_id }}"
    area_id: "{{ item.area }}"
  loop: "{{ ospf_router_changes.area_additions }}"
  loop_control:
    label: "VRF: {{ item.vrf }} Area: {{ item.area }}"
  when: ospf_router_changes.area_additions | length > 0

# Per-interface OSPF configuration (area attachment, network type, passive, MD5 auth).
#
# Uses arubanetworks.aoscx.aoscx_ospf_interface (REST-based, idempotent) so we
# do not have to push CLI lines containing cleartext secrets via aoscx_config.
# Authentication is only configured when ospf_auth_keys has an entry for the
# interface's VRF; otherwise just area + network type are reconciled.
# item.md5_auth_desired is precomputed in identify_ospf_changes.yml so the
# auth-key-presence logic lives in exactly one place.

# Configure OSPF on interfaces using CLI so plaintext and ciphertext MD5 keys
# are handled consistently for all devices.
- name: Configure OSPF on interfaces (area, network type, and authentication)
  arubanetworks.aoscx.aoscx_config:
    lines: >-
      {%- set lines = [] -%}
      {%- set key_id = ospf_auth_key_id | default(1) | int -%}
      {%- set key_obj = (ospf_auth_keys.get(item.vrf)
          if ospf_auth_keys is defined else none) -%}
      {%- set key_secret = ((key_obj.secret if key_obj is mapping else key_obj)
          | default('', true)) -%}
      {%- set key_encrypted = (key_obj.encrypted | default(false) | bool
          if key_obj is mapping else false) -%}

      {%- set _ = lines.append('ip ospf ' ~ (ospf_config.process_id | int) ~ ' area ' ~ item.area_id) -%}
      {%- if item.network_type is defined and item.network_type | length > 0 and
            item.network_type != 'loopback' -%}
        {%- set _ = lines.append('ip ospf network ' ~ item.network_type) -%}
      {%- endif -%}

      {%- if item.md5_auth_desired -%}
        {%- set _ = lines.append('ip ospf authentication message-digest') -%}
        {%- set _ = lines.append(
          'ip ospf message-digest-key ' ~ key_id ~ ' md5 ' ~
          ('ciphertext ' if key_encrypted else 'plaintext ') ~ key_secret
        ) -%}
      {%- else -%}
        {%- set _ = lines.append('no ip ospf authentication message-digest') -%}
        {%- set _ = lines.append('no ip ospf message-digest-key ' ~ key_id) -%}
      {%- endif -%}
      {{ lines }}
    parents:
      - "interface {{ item.interface_name }}"
  vars:
    ansible_connection: ansible.netcommon.network_cli
  loop: "{{ ospf_interface_changes.config_changes }}"
  loop_control:
    label: "Interface: {{ item.interface_name }} (VRF: {{ item.vrf }}, area: {{
      item.area_id }})"
  when:
    - ospf_interface_changes.config_changes | length > 0
  no_log: true

# Configure passive OSPF interfaces (no OSPF hello packets sent/received).
# The aoscx_ospf_interface module doesn't support passive configuration,
# so we use CLI commands. Loopback interfaces are excluded since passive
# is implicit on loopbacks and not configurable via CLI.
# Note: aoscx_config requires CLI/SSH connection, not REST API.
- name: Configure OSPF passive interfaces
  arubanetworks.aoscx.aoscx_config:
    lines:
      - ip ospf passive
    parents:
      - "interface {{ item.interface_name }}"
  vars:
    ansible_connection: ansible.netcommon.network_cli
  loop: "{{ ospf_interface_changes.passive_set }}"
  loop_control:
    label: "Interface: {{ item.interface_name }} (VRF: {{ item.vrf }})"
  when:
    - ospf_interface_changes.passive_set | length > 0

# Remove passive from OSPF interfaces where NetBox state changed from passive to active.
- name: Remove OSPF passive from non-passive interfaces
  arubanetworks.aoscx.aoscx_config:
    lines:
      - no ip ospf passive
    parents:
      - "interface {{ item.interface_name }}"
  vars:
    ansible_connection: ansible.netcommon.network_cli
  loop: "{{ ospf_interface_changes.passive_clear }}"
  loop_control:
    label: "Interface: {{ item.interface_name }} (VRF: {{ item.vrf }})"
  when:
    - ospf_interface_changes.passive_clear | length > 0

- name: Debug - OSPF configuration summary
  ansible.builtin.debug:
    msg:
      - "OSPF Process ID: {{ ospf_config.process_id }}"
      - "OSPF Router configured: {{ ospf_config.router_id is defined and
        ospf_config.router_id | length > 0 }}"
      - "OSPF VRFs: {{ ospf_config.vrfs | length }}"
      - "Total OSPF Areas in NetBox: {{ ospf_config.vrfs |
        map(attribute='areas') | map('default', []) | map('length') | sum }}"
      - "OSPF Interfaces in NetBox: {{ ospf_interfaces | length }}"
      - "Router/area changes pushed: {{ ospf_router_changes.router_changes | length
        + ospf_router_changes.area_additions | length }}"
      - "Interface changes pushed: {{ ospf_interface_changes.config_changes | length
        + ospf_interface_changes.passive_set | length
        + ospf_interface_changes.passive_clear | length }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1
