---
# Configure OSPF on AOS-CX switches

- name: Get interfaces with OSPF configuration from NetBox
  ansible.builtin.set_fact:
    ospf_interfaces: "{{ interfaces | select_ospf_interfaces }}"

- name: Debug - Show OSPF interface filtering
  ansible.builtin.debug:
    msg:
      - "Interfaces with OSPF config: {{ ospf_interfaces | length }}"
      - "OSPF Areas in use: {{ ospf_interfaces | map(attribute='custom_fields.if_ip_ospf_1_area') | select | unique | list }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Debug - Show raw config_context and custom_fields
  ansible.builtin.debug:
    msg:
      - "config_context type: {{ config_context | type_debug }}"
      - "config_context keys: {{ config_context.keys() | list if config_context is mapping else 'Not a mapping' }}"
      - "config_context.ospf_1_vrf: {{ config_context.ospf_1_vrf | default('NOT FOUND') }}"
      - "config_context.ospf_areas: {{ config_context.ospf_areas | default('NOT FOUND') }}"
      - "custom_fields.device_ospf_1_routerid: {{ custom_fields.device_ospf_1_routerid | default('NOT FOUND') }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Get OSPF configuration from device custom fields
  ansible.builtin.set_fact:
    ospf_config:
      vrf: "{{ config_context.ospf_1_vrf | default('default') }}"
      router_id: "{{ custom_fields.device_ospf_1_routerid | default('') }}"
      areas: "{{ config_context.ospf_areas | default([]) }}"

- name: Debug - Show OSPF configuration
  ansible.builtin.debug:
    msg:
      - "OSPF VRF: {{ ospf_config.vrf }}"
      - "OSPF Router ID: {{ ospf_config.router_id | default('Not configured') }}"
      - "OSPF Areas: {{ ospf_config.areas }}"
      - "Interfaces to configure: {{ ospf_interfaces | length }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Configure OSPF router instance
  arubanetworks.aoscx.aoscx_ospf_router:
    vrf: "{{ ospf_config.vrf }}"
    instance_tag: 1
    admin_router_id: "{{ ospf_config.router_id }}"
  when:
    - ospf_config.router_id is defined
    - ospf_config.router_id | length > 0

- name: Configure OSPF areas
  arubanetworks.aoscx.aoscx_ospf_area:
    vrf: "{{ ospf_config.vrf }}"
    ospf_id: 1
    area_id: "{{ item.ospf_1_area }}"
  loop: "{{ ospf_config.areas }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} Area: {{ item.ospf_1_area }}"
  when: ospf_config.areas | length > 0

- name: Configure OSPF on interfaces with defined VRF
  arubanetworks.aoscx.aoscx_ospf_interface:
    interface_name: "{{ item.name }}"
    ospf_id: 1
    area_id: "{{ item.custom_fields.if_ip_ospf_1_area }}"
    type: "{{ item.custom_fields.if_ip_ospf_network | replace('-', '_') }}"
    vrf: "{{ item.vrf.name if item.vrf and item.vrf.name else 'default' }}"
    version: v2
  loop: "{{ ospf_interfaces }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} Interface: {{ item.name }}"
  when:
    - item.custom_fields.if_ip_ospf_1_area is defined
    - item.custom_fields.if_ip_ospf_1_area | length > 0
    - item.vrf is defined
    - item.vrf is not none

- name: Configure OSPF on interfaces with default VRF (no VRF defined)
  arubanetworks.aoscx.aoscx_ospf_interface:
    interface_name: "{{ item.name }}"
    ospf_id: 1
    area_id: "{{ item.custom_fields.if_ip_ospf_1_area }}"
    type: "{{ item.custom_fields.if_ip_ospf_network | replace('-', '_') }}"
    vrf: "default"
    version: v2
  loop: "{{ ospf_interfaces }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} Interface: {{ item.name }}"
  when:
    - item.custom_fields.if_ip_ospf_1_area is defined
    - item.custom_fields.if_ip_ospf_1_area | length > 0
    - item.vrf is not defined or item.vrf is none

- name: Debug - OSPF configuration summary
  ansible.builtin.debug:
    msg:
      - "OSPF Router configured: {{ ospf_config.router_id is defined and ospf_config.router_id | length > 0 }}"
      - "OSPF Areas configured: {{ ospf_config.areas | length }}"
      - "OSPF Interfaces configured: {{ ospf_interfaces | length }}"
  when: aoscx_debug | bool or ansible_verbosity >= 0
