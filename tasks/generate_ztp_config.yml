---
# tasks/generate_ztp_config.yml
# Generate ZTP base configuration for initial switch deployment
#
# Prerequisites:
# - interfaces variable from NetBox dynamic inventory (set 'interfaces: true' in inventory config)
# - Management interfaces should have mgmt_only=True in NetBox
# - config_context should contain mgmt_defaultgateway and mgmt_nameserver
#
# This task filters interfaces where mgmt_only=True to generate management config
# The 'interfaces' variable is automatically populated by NetBox inventory plugin
# when 'interfaces: true' is configured in inventory.netbox.yml
#
# Note: This captures both:
# - Dedicated management interfaces (e.g., "mgmt")
# - VLAN interfaces used for management (e.g., "vlan100" with mgmt_only=True)

- name: "Filter management interfaces from NetBox"
  ansible.builtin.set_fact:
    mgmt_interfaces: "{{ interfaces | default([]) | selectattr('mgmt_only', 'defined') | selectattr('mgmt_only') | list }}"
  when:
    - mgmt_interfaces is not defined
    - interfaces is defined
  tags:
    - ztp
    - config_generation

- name: "Debug - Show management interfaces found"
  ansible.builtin.debug:
    msg:
      - "Management interfaces found: {{ mgmt_interfaces | default([]) | length }}"
      - "Interface names: {{ mgmt_interfaces | default([]) | map(attribute='name') | list }}"
      - "Interface types: {{ mgmt_interfaces | default([]) | map(attribute='type') | map(attribute='label') | list }}"
  when:
    - aoscx_debug | default(false) | bool or ansible_verbosity >= 1
    - aoscx_generate_ztp_config | default(false) | bool
  tags:
    - ztp
    - config_generation

- name: "Create ZTP output directory"
  ansible.builtin.file:
    path: "{{ aoscx_ztp_output_dir | default('./ztp_configs') }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true
  when:
    - aoscx_generate_ztp_config | default(false) | bool
  tags:
    - ztp
    - config_generation

- name: "Generate ZTP base configuration"
  ansible.builtin.template:
    src: ztp_base_config.j2
    dest: "{{ aoscx_ztp_output_dir | default('./ztp_configs') }}/{{ inventory_hostname }}_ztp_base.cfg"
    backup: "{{ aoscx_ztp_backup_configs | default(true) }}"
    mode: '0644'
  delegate_to: localhost
  run_once: false
  tags:
    - ztp
    - config_generation
  when:
    - aoscx_generate_ztp_config | default(false) | bool

- name: "Display ZTP configuration file location"
  ansible.builtin.debug:
    msg:
      - "ZTP configuration generated:"
      - "  File: {{ aoscx_ztp_output_dir | default('./ztp_configs') }}/{{ inventory_hostname }}_ztp_base.cfg"
      - "  Host: {{ inventory_hostname }}"
      - "  Management interfaces configured: {{ mgmt_interfaces | default([]) | length | default('unknown') }}"
  when:
    - aoscx_generate_ztp_config | default(false) | bool
  tags:
    - ztp
    - config_generation

- name: "Create ZTP configuration summary"
  ansible.builtin.set_fact:
    ztp_config_summary:
      file_path: "{{ aoscx_ztp_output_dir | default('./ztp_configs') }}/{{ inventory_hostname }}_ztp_base.cfg"
      hostname: "{{ inventory_hostname }}"
      admin_user: "{{ aoscx_ztp_admin_user | default(ansible_user) | default('admin') }}"
      mgmt_interfaces: "{{ mgmt_interfaces | default([]) | map(attribute='name') | list }}"
      generated_at: "{{ ansible_date_time.iso8601 | default(ansible_facts.date_time.iso8601) | default(lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ')) }}"
  when:
    - aoscx_generate_ztp_config | default(false) | bool
  tags:
    - ztp
    - config_generation
