---
# Configure VLANs on AOS-CX switches (CREATE only)
#
# This task file ONLY creates VLANs from NetBox.
# VLAN deletion happens in cleanup_vlans.yml AFTER interface cleanup
# to ensure VLANs are not in use when deleted.
#
# Prerequisites: identify_vlan_changes.yml must run first to set:
# - vlans: VLANs available from NetBox
# - vlans_in_use: VLANs currently in use on interfaces
# - vlan_changes: VLANs to create/delete
#
# Task order: identify_vlan_changes.yml → configure_vlans.yml → interface cleanup → cleanup_vlans.yml

- name: Verify VLAN analysis has been performed
  ansible.builtin.assert:
    that:
      - vlans is defined
      - vlans_in_use is defined
      - vlan_changes is defined
    fail_msg: "ERROR: identify_vlan_changes.yml must run before configure_vlans.yml"
    success_msg: "VLAN analysis completed - proceeding with VLAN creation"

- name: Debug - Show VLAN creation plan
  ansible.builtin.debug:
    msg:
      - "=== VLAN Creation (configure_vlans.yml) ==="
      - "VLANs to create: {{ vlan_changes.vlans_to_create | length }} - {{
        vlan_changes.vlans_to_create | map(attribute='vid') | list | sort }}"
      - "VLANs to delete (later): {{ vlan_changes.vlans_to_delete | length }} -
        {{ vlan_changes.vlans_to_delete | sort }}"
      - "Note: VLAN deletion happens in cleanup_vlans.yml after interface
        cleanup"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Create VLANs
  arubanetworks.aoscx.aoscx_vlan:
    vlan_id: "{{ item.vid }}"
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    ip_igmp_snooping: "{{ item.custom_fields.vlan_ip_igmp_snooping | default(false) }}"
    state: create
  loop: "{{ vlan_changes.vlans_to_create }}"
  loop_control:
    label: "VLAN {{ item.vid }} - {{ item.name }}"
  when:
    - vlan_changes.vlans_to_create | length > 0
    - item.vid >= 2 and item.vid <= 4094 # Only create valid VLAN IDs

# Update IGMP snooping settings on VLANs in use from NetBox
# This ensures changes to the vlan_ip_igmp_snooping custom field are applied
# Only applies to VLANs that are actually in use on this device
# Uses enhanced VLAN facts (when available) to only update VLANs where IGMP settings differ
- name: Update VLAN IGMP snooping settings
  arubanetworks.aoscx.aoscx_vlan:
    vlan_id: "{{ item.vid }}"
    ip_igmp_snooping: "{{ item.custom_fields.vlan_ip_igmp_snooping | default(false) }}"
    state: update
  loop: "{{ vlans | get_vlans_needing_igmp_update(vlans_in_use,
    aoscx_enhanced_vlan_facts | default(none)) }}"
  loop_control:
    label: "VLAN {{ item.vid }} - IGMP snooping: {{
      item.custom_fields.vlan_ip_igmp_snooping | default(false) }}"
  when:
    - vlans | length > 0
    - vlans_in_use.vids | length > 0

# NOTE: VLAN deletion is handled in cleanup_vlans.yml task
# This runs AFTER interface cleanup to ensure VLANs are not in use
# when they are deleted. See tasks/main.yml for task ordering.
