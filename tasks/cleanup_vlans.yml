---
# Cleanup VLANs (DELETE only)
#
# This task file runs AFTER:
# 1. identify_vlan_changes.yml (to know what to delete)
# 2. cleanup_evpn.yml (to remove EVPN configuration first)
# 3. cleanup_vxlan.yml (to remove VXLAN/VNI mappings second)
# 4. All interface cleanup tasks (to ensure VLANs aren't in use)
#
# Only then is it safe to delete the VLAN from the switch.
# This includes orphaned VLANs that exist on the switch but not in NetBox.
#
# Uses the vlan_changes fact calculated in identify_vlan_changes.yml

- name: Debug - Show VLANs to delete
  ansible.builtin.debug:
    msg:
      - "VLANs to delete: {{ vlan_changes.vlans_to_delete }}"
  when:
    - aoscx_debug | bool or ansible_verbosity >= 1
    - vlan_changes is defined

- name: Delete unused VLANs
  arubanetworks.aoscx.aoscx_vlan:
    vlan_id: "{{ item }}"
    state: delete
  loop: "{{ vlan_changes.vlans_to_delete }}"
  loop_control:
    label: "VLAN {{ item }}"
  when:
    - vlan_changes is defined
    - vlan_changes.vlans_to_delete | length > 0
    - item != 1  # Never delete VLAN 1
