---
# Gather enhanced interface facts via REST API with depth=2
#
# This task file gathers additional interface data not available in standard aoscx_facts:
# - IPv6 addresses (actual values instead of URI references)
# - VSX virtual IPs (vsx_virtual_ip4, vsx_virtual_ip6) for anycast/active-gateway
# - VSX virtual gateway MACs (vsx_virtual_gw_mac_v4, vsx_virtual_gw_mac_v6)
#
# Prerequisites:
# - aoscx_gather_enhanced_facts: true
# - REST API credentials (aoscx_rest_host, aoscx_rest_user, aoscx_rest_password)
#   or defaults to ansible_host, ansible_user, ansible_password
#
# Output:
# - aoscx_enhanced_interface_facts: Dict of interface data with expanded attributes

- name: Set REST API variables
  ansible.builtin.set_fact:
    _rest_host: "{{ aoscx_rest_host | default(ansible_host) }}"
    _rest_user: "{{ aoscx_rest_user | default(ansible_user) }}"
    _rest_password: "{{ aoscx_rest_password | default(ansible_password) }}"
    _rest_validate_certs: "{{ aoscx_rest_validate_certs | default(false) }}"
  no_log: true
  tags:
    - always

# Query available API versions and use the latest one
# The ansible_aoscx_rest_version may report an older version (e.g., 10.09)
# but the switch may support newer versions (e.g., 10.17) that properly
# expand ip6_addresses with depth=2
- name: Query available REST API versions
  ansible.builtin.uri:
    url: "https://{{ _rest_host }}/rest/v1/firmware"
    method: GET
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_firmware
  delegate_to: localhost
  ignore_errors: true
  tags:
    - always

- name: Determine best REST API version
  ansible.builtin.set_fact:
    # The firmware endpoint returns current_version like "FL.10.14.0001"
    # Extract major.minor version (e.g., "10.14") for the REST API path
    # Fallback chain:
    # 1. Extract from firmware current_version
    # 2. Use user-specified aoscx_rest_api_version
    # 3. Fallback to ansible_aoscx_rest_version
    _rest_api_version: >-
      {%- if _rest_firmware is succeeded and _rest_firmware.json.current_version is defined -%}
        {{ _rest_firmware.json.current_version | regex_search('([0-9]+\\.[0-9]+)', '\\1') | first | default(ansible_aoscx_rest_version) }}
      {%- elif aoscx_rest_api_version is defined -%}
        {{ aoscx_rest_api_version }}
      {%- else -%}
        {{ ansible_aoscx_rest_version }}
      {%- endif -%}
  tags:
    - always

- name: Set REST API base URL
  ansible.builtin.set_fact:
    _rest_api_base: "https://{{ _rest_host }}/rest/v{{ _rest_api_version }}"
  tags:
    - always

- name: Debug - Show REST API version being used
  ansible.builtin.debug:
    msg:
      - "ansible_aoscx_rest_version (from aoscx_facts): {{ ansible_aoscx_rest_version }}"
      - "Firmware query result: {{ _rest_firmware.json | default('FAILED or N/A') }}"
      - "Using REST API version: {{ _rest_api_version }}"
      - "REST API base URL: {{ _rest_api_base }}"
  when:
    - aoscx_debug | default(false) | bool
  tags:
    - always

- name: Login to AOS-CX REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/login"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ _rest_user }}"
      password: "{{ _rest_password }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_login
  delegate_to: localhost
  no_log: "{{ aoscx_no_log | default(true) }}"
  tags:
    - always

- name: Query interfaces with depth=2
  ansible.builtin.uri:
    url: >-
      {{ _rest_api_base }}/system/interfaces?depth=2&attributes=name,ip4_address,ip4_address_secondary,ip6_addresses,ip_mtu,vsx_virtual_gw_mac_v4,vsx_virtual_gw_mac_v6,vsx_virtual_ip4,vsx_virtual_ip6,admin,description
    method: GET
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200]
    return_content: true
  register: _rest_interfaces
  delegate_to: localhost
  tags:
    - always

- name: Logout from AOS-CX REST API
  ansible.builtin.uri:
    url: "{{ _rest_api_base }}/logout"
    method: POST
    headers:
      Cookie: "{{ _rest_login.cookies_string }}"
    validate_certs: "{{ _rest_validate_certs }}"
    status_code: [200, 204]
  delegate_to: localhost
  no_log: true
  tags:
    - always

- name: Store enhanced interface facts
  ansible.builtin.set_fact:
    aoscx_enhanced_interface_facts: "{{ _rest_interfaces.json }}"
  tags:
    - always

- name: Debug - Show enhanced interface facts summary
  ansible.builtin.debug:
    msg:
      - "=== Enhanced Interface Facts (REST API depth=2) ==="
      - "Total interfaces: {{ aoscx_enhanced_interface_facts | length }}"
      - "Sample interface keys: {{ (aoscx_enhanced_interface_facts | dict2items | first).value.keys() | list if aoscx_enhanced_interface_facts | length > 0 else 'N/A' }}"
  when:
    - aoscx_debug | default(false) | bool
  tags:
    - always
