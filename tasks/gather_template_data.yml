---
# Gather VRF and VLAN data for template generation
# This task works with or without device facts (can run before devices are up)
# When facts are available: filters for VRFs/VLANs in use on device
# When facts are unavailable: fetches all available VRFs/VLANs from NetBox

# Check if device facts are available
- name: Determine if device facts are available
  ansible.builtin.set_fact:
    has_device_facts: "{{ interfaces is defined }}"

# ============================================================================
# PATH 1: WITH device facts (interfaces available)
# ============================================================================
- name: Get VRFs in use on device (WITH facts)
  ansible.builtin.set_fact:
    vrfs_in_use_facts: "{{ interfaces | get_vrfs_in_use(ip_addresses | default([])) }}"
  when:
    - has_device_facts | bool
    - interfaces is defined

- name: Calculate VLANs currently in use by interfaces (WITH facts)
  ansible.builtin.set_fact:
    vlans_in_use_facts: "{{ interfaces | get_vlans_in_use(vlan_interfaces | default([])) }}"
  when:
    - has_device_facts | bool
    - interfaces is defined

# ============================================================================
# PATH 2: WITHOUT device facts (no interfaces available)
# ============================================================================
- name: Set empty VRF/VLAN lists if no device facts
  ansible.builtin.set_fact:
    vrfs_in_use_facts:
      vrf_names: []
      vrfs: {}
    vlans_in_use_facts: []
  when: not (has_device_facts | bool)

# ============================================================================
# ALWAYS: Fetch VRF and VLAN data from NetBox
# ============================================================================
- name: Get VLANs available from NetBox (for template)
  ansible.builtin.uri:
    url: "{{ netbox_url }}/api/ipam/vlans/?available_on_device={{ device_id }}&limit=0"
    method: GET
    return_content: true
    validate_certs: false
    headers:
      accept: "application/json"
      Authorization: "Token {{ netbox_token }}"
  register: nb_vlans_response
  vars:
    ansible_connection: local
  when: vlans is not defined or vlans | length == 0
  delegate_to: localhost
  ignore_errors: true

- name: Set vlans fact from API response
  ansible.builtin.set_fact:
    vlans_available: "{{ nb_vlans_response.json.results }}"
  when:
    - nb_vlans_response is defined
    - nb_vlans_response.json is defined
    - nb_vlans_response.json.results is defined

- name: Use existing vlans fact if available
  ansible.builtin.set_fact:
    vlans_available: "{{ vlans }}"
  when:
    - vlans is defined
    - vlans | length > 0
    - vlans_available is not defined

- name: Set empty VLAN list as fallback
  ansible.builtin.set_fact:
    vlans_available: []
  when: vlans_available is not defined

# Get VRF details from NetBox using pynetbox
- name: Get VRF details from NetBox (only if VRFs in use)
  ansible.builtin.set_fact:
    netbox_vrfs: "{{ lookup('netbox.netbox.nb_lookup', 'vrfs',
      api_filter='name=' + item,
      api_endpoint=netbox_url,
      token=netbox_token,
      validate_certs=false) }}"
  loop: "{{ vrfs_in_use_facts.vrf_names }}"
  register: vrf_details_raw
  when:
    - vrfs_in_use_facts.vrf_names | length > 0
  ignore_errors: true

- name: Build VRF details dictionary
  ansible.builtin.set_fact:
    vrf_details: >-
      {{
        vrf_details | default({}) | combine({
          item.item: item.ansible_facts.netbox_vrfs.value
        })
      }}
  loop: "{{ vrf_details_raw.results }}"
  loop_control:
    label: "VRF: {{ item.item }}"
  when:
    - vrf_details_raw is defined
    - vrf_details_raw.results is defined
    - item.ansible_facts is defined
    - item.ansible_facts.netbox_vrfs is defined
    - item.ansible_facts.netbox_vrfs is not none
    - item.ansible_facts.netbox_vrfs | length > 0

# Debug output
- name: Debug - Show VRF and VLAN data for template
  ansible.builtin.debug:
    msg:
      - "Device facts available: {{ has_device_facts }}"
      - "VRFs in use: {{ vrfs_in_use_facts.vrf_names | default([]) }}"
      - "VLANs available from NetBox: {{ vlans_available | default([]) | length }}"
      - "VLANs in use on device: {{ vlans_in_use_facts | default([]) | length }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

# Make data available as top-level facts for templates
- name: Set template-accessible VRF and VLAN facts
  ansible.builtin.set_fact:
    template_vrfs: "{{ vrfs_in_use_facts.vrf_names | default([]) }}"
    template_vlans: "{{ vlans_available | default([]) }}"
    template_vrfs_details: "{{ vrf_details | default({}) }}"
    template_vlans_in_use: "{{ vlans_in_use_facts | default([]) }}"
    template_has_device_facts: "{{ has_device_facts }}"
