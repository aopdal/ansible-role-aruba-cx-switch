---
# Configure STP (Spanning Tree Protocol) — global and per-interface settings
#
# Depends on: gather_facts_rest_api.yml (aoscx_stp_global_facts,
#             aoscx_enhanced_interface_facts)
#
# Global STP (MSTP): reads mstp_config_name, mstp_priority, and
# mstp_config_revision from the device's NetBox config_context.
# Applied only when mstp_config_name is defined and device state differs.
#
# Interface STP: configures bpdu-filter, bpdu-guard, root-guard, and
# port-type admin-edge on L2 interfaces (access / tagged / tagged-all)
# from four NetBox custom fields per interface:
#   if_stp_bpdu_filter  — spanning-tree bpdu-filter
#   if_stp_bpdu_guard   — spanning-tree bpdu-guard
#   if_stp_edge_port    — spanning-tree port-type admin-edge
#   if_stp_root_guard   — spanning-tree root-guard
#
# Change detection: compares NetBox desired state against REST API facts.
# Global: aoscx_stp_global_facts (from /system?attributes=stp_config)
# Interface: aoscx_enhanced_interface_facts[name].stp_config
# When REST API facts are unavailable all settings are pushed unconditionally.
#
# Dependencies: L2 interface configuration (configure_l2_interfaces) must run
# first so that the interfaces already exist on the switch.

# ============================================================================
# Global STP (MSTP) configuration
# ============================================================================

- name: Compare global MSTP configuration against device facts
  ansible.builtin.set_fact:
    _stp_global_diff: >-
      {{ {
        'mstp_config_name': mstp_config_name | default(None),
        'mstp_config_revision': mstp_config_revision | default(0),
        'mstp_priority': mstp_priority | default(8),
      } | stp_global_config_diff(aoscx_stp_global_facts | default({})) }}
  when:
    - mstp_config_name is defined

- name: Display global MSTP diff results
  ansible.builtin.debug:
    msg:
      - "MSTP changes needed: {{ _stp_global_diff.changed }}"
      - "Changes: {{ _stp_global_diff.changes }}"
  when:
    - _stp_global_diff is defined
    - aoscx_debug | bool or ansible_verbosity >= 1

- name: Apply global STP (MSTP) configuration
  arubanetworks.aoscx.aoscx_config:
    lines: "{{ _stp_global_diff.lines }}"
  when:
    - mstp_config_name is defined
    - _stp_global_diff is defined
    - _stp_global_diff.changed | bool
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

- name: Skip global MSTP - no changes needed
  ansible.builtin.debug:
    msg: "Global MSTP configuration on {{ inventory_hostname }} matches NetBox - no changes needed"
  when:
    - mstp_config_name is defined
    - _stp_global_diff is defined
    - not (_stp_global_diff.changed | bool)
    - aoscx_debug | bool or ansible_verbosity >= 1

# ============================================================================
# Interface STP configuration
# ============================================================================

- name: Build STP interface change list
  ansible.builtin.set_fact:
    _stp_interface_changes: >-
      {{ interfaces | default([]) |
         stp_interface_changes(aoscx_enhanced_interface_facts | default({})) }}

- name: Debug - Show STP interface changes
  ansible.builtin.debug:
    msg:
      - "=== STP Interface Configuration ==="
      - "Interfaces needing STP changes: {{ _stp_interface_changes | length }}"
      - "Interfaces: {{ _stp_interface_changes | map(attribute='name') | list }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: Apply STP configuration to interfaces
  arubanetworks.aoscx.aoscx_config:
    lines: "{{ item.lines }}"
    parents: "interface {{ item.name | replace('lag', 'lag ') }}"
  loop: "{{ _stp_interface_changes }}"
  loop_control:
    label: "Interface {{ item.name }}: {{ item.lines | join(', ') }}"
  when: _stp_interface_changes | length > 0
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"
