---
# DEPRECATED: This file is now deprecated
#
# L2 interface configuration (both standard and idempotent modes) has been
# unified into configure_l2_interfaces.yml for better maintainability.
#
# This file is kept for backwards compatibility but will be removed in a future version.
# Please use configure_l2_interfaces.yml directly.
#
# Migration: Simply include configure_l2_interfaces.yml instead of this file.
# The mode (standard vs idempotent) is automatically detected based on the
# aoscx_idempotent_mode variable.

- name: Deprecated file warning
  ansible.builtin.debug:
    msg:
      - "⚠️  WARNING: configure_l2_interfaces_idempotent.yml is DEPRECATED"
      - "This file will be removed in a future version."
      - "Please update your playbooks to use configure_l2_interfaces.yml"
      - "The task will continue normally by redirecting to the unified file."

- name: Redirect to unified L2 interface configuration
  ansible.builtin.include_tasks: configure_l2_interfaces.yml
