---
# Identify VLAN changes (additions and deletions)
#
# This task file is the SINGLE SOURCE OF TRUTH for VLAN change calculations.
# It determines which VLANs need to be added or removed based on:
# - VLANs defined in NetBox (desired state)
# - VLANs currently in use by interfaces (can't be deleted)
# - VLANs currently on the device (actual state)
#
# This task MUST run:
# 1. BEFORE configure_vlans.yml, configure_evpn.yml, configure_vxlan.yml
# 2. BEFORE cleanup_evpn.yml, cleanup_vxlan.yml, cleanup_vlans.yml
#
# The facts set by this task are used by:
# - vlans_in_use: Used by configure_vlans.yml, configure_evpn.yml, configure_vxlan.yml
# - vlan_changes: Used by configure_vlans.yml, cleanup_evpn.yml, cleanup_vxlan.yml, cleanup_vlans.yml

- name: Get VLANs available on device from NetBox (if not provided)
  ansible.builtin.uri:
    url: "{{ netbox_url }}/api/ipam/vlans/?available_on_device={{ device_id }}&limit=0"
    method: GET
    return_content: true
    validate_certs: false
    headers:
      accept: "application/json"
      Authorization: "Token {{ netbox_token }}"
  register: nb_vlans_response
  vars:
    ansible_connection: local
  when: vlans is not defined or vlans | length == 0
  delegate_to: localhost

- name: Set vlans fact from API response
  ansible.builtin.set_fact:
    vlans: "{{ nb_vlans_response.json.results }}"
  when:
    - nb_vlans_response is defined
    - nb_vlans_response.json is defined
    - nb_vlans_response.json.results is defined

# Note: We use existing facts gathered by gather_facts.yml (earlier in main.yml)
# No need to re-gather here - facts are already available in ansible_facts.network_resources
# This avoids duplicate API calls and improves performance

- name: Calculate VLANs currently in use by interfaces
  ansible.builtin.set_fact:
    vlans_in_use: >-
      {{ interfaces | get_vlans_in_use(
           vlan_interfaces | default([]),
           port_access | default({})
         ) }}
  when:
    - interfaces is defined
    - not (aoscx_configure_vlans_all | default(false) | bool)

- name: Treat all NetBox-available VLANs as in use (aoscx_configure_vlans_all=true)
  ansible.builtin.set_fact:
    vlans_in_use:
      vids: >-
        {{ vlans | default([])
             | map(attribute='vid')
             | select('integer')
             | unique | sort | list }}
      vlans: "{{ vlans | default([]) }}"
  when:
    - aoscx_configure_vlans_all | default(false) | bool

- name: Determine VLAN changes needed
  ansible.builtin.set_fact:
    vlan_changes: "{{ vlans | get_vlans_needing_changes(vlans_in_use, ansible_facts | default({})) }}"

- name: Debug - Show VLAN analysis results
  ansible.builtin.debug:
    msg:
      - "=== VLAN Analysis (identify_vlan_changes.yml) ==="
      - >-
        Mode:
        {{ 'configure-all (aoscx_configure_vlans_all=true)'
           if (aoscx_configure_vlans_all | default(false) | bool)
           else 'in-use (interfaces + port-access)' }}
      - "VLANs available from NetBox: {{ vlans | length }}"
      - "VLANs in use on interfaces: {{ vlans_in_use.vids | length }} - {{ vlans_in_use.vids | sort }}"
      - >-
        VLANs referenced by port-access roles:
        {{ (port_access | default({})) | extract_port_access_vlan_ids }}
      - "VLANs to create: {{ vlan_changes.vlans_to_create | length }} - {{ vlan_changes.vlans_to_create | map(attribute='vid') | list | sort }}"
      - "VLANs to delete: {{ vlan_changes.vlans_to_delete | length }} - {{ vlan_changes.vlans_to_delete | sort }}"
      - "VLANs in use (protected from deletion): {{ vlan_changes.vlans_in_use | length }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1
