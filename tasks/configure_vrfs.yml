---
# Configure VRFs on AOS-CX switches
#
# Depends on: identify_vrf_changes.yml (included just before this file in
# tasks/main.yml), which sets vrfs_in_use, vrf_rt_config, and vrf_changes -
# the categorized create/RD/route-target diff against device state.
#
# When aoscx_vrf_facts/aoscx_vrf_rt_facts are unavailable (REST API fact
# gathering disabled), vrf_changes.to_create/rd_changes/rt_additions contain
# every desired VRF/RD/RT (push everything, let aoscx_vrf's own idempotency
# and aoscx_config's match: line handle it) - same convention as static
# route / VRF route-target removal handling.
#
# Route-target removals additionally require aoscx_idempotent_mode: true,
# same pattern used for static route cleanup.

- name: Create VRFs
  arubanetworks.aoscx.aoscx_vrf:
    name: "{{ item }}"
    state: create
  loop: "{{ vrf_changes.to_create }}"
  loop_control:
    label: "VRF: {{ item }}"
  when: vrf_changes.to_create | length > 0

- name: Configure VRF Route Distinguisher (RD)
  arubanetworks.aoscx.aoscx_config:
    lines:
      - "rd {{ item.rd }}"
    parents: "vrf {{ item.vrf }}"
    match: line
  loop: "{{ vrf_changes.rd_changes }}"
  loop_control:
    label: "VRF: {{ item.vrf }} RD: {{ item.rd }}"
  when: vrf_changes.rd_changes | length > 0
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

- name: Add VRF route targets
  arubanetworks.aoscx.aoscx_config:
    lines:
      - "route-target {{ item.direction }} {{ item.rt }}"
    parents:
      - "vrf {{ item.vrf }}"
      - "address-family {{ item.address_family }} unicast"
    match: line
  loop: "{{ vrf_changes.rt_additions }}"
  loop_control:
    label: "VRF: {{ item.vrf }} {{ item.address_family }} add {{ item.direction }} {{ item.rt }}"
  when: vrf_changes.rt_additions | length > 0
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"

- name: Remove stale VRF route targets
  arubanetworks.aoscx.aoscx_config:
    lines:
      - "no route-target {{ item.direction }} {{ item.rt }}"
    parents:
      - "vrf {{ item.vrf }}"
      - "address-family {{ item.address_family }} unicast"
    match: line
  loop: "{{ vrf_changes.rt_removals }}"
  loop_control:
    label: "VRF: {{ item.vrf }} {{ item.address_family }} remove {{ item.direction }} {{ item.rt }}"
  when:
    - aoscx_idempotent_mode | bool
    - vrf_changes.rt_removals | length > 0
  vars:
    ansible_connection: "{{ aoscx_connection_type }}"
