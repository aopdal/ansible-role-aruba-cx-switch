---
# Gather facts from AOS-CX switches
#
# IMPORTANT: This task gathers ALL network resources needed by the role.
# When gathering facts elsewhere in the role, ALWAYS include ALL resources
# listed below, not just a subset. The aoscx_facts module OVERWRITES the
# network_resources dict, so gathering only 'vlans' will DELETE 'interfaces'.
#
# If you need to re-gather facts during the playbook run, either:
# 1. Use include_tasks: gather_facts.yml (recommended)
# 2. Or gather ALL resources: gather_network_resources: [interfaces, vlans]
#
# Enhanced Facts (optional):
# Set aoscx_gather_enhanced_facts: true to also gather via REST API with depth=2.
# This provides IPv6 addresses and VSX virtual IPs for better change detection.

- name: Gather device facts
  arubanetworks.aoscx.aoscx_facts:
    gather_network_resources:
      - interfaces
      - vlans
  register: device_facts_result
  tags:
    - always

- name: Debug - Show device facts structure
  ansible.builtin.debug:
    msg:
      - "ansible_facts keys: {{ ansible_facts.keys() | list if ansible_facts is defined else 'ansible_facts not defined' }}"
      - "Has network_resources: {{ 'network_resources' in ansible_facts if ansible_facts is defined else false }}"
      - >-
        Interfaces found: {{ ansible_facts.network_resources.interfaces.keys() | list | length
        if ansible_facts.network_resources.interfaces is defined else 0 }}
      - "VLANs found: {{ ansible_facts.network_resources.vlans.keys() | list | length if ansible_facts.network_resources.vlans is defined else 0 }}"
  when:
    - aoscx_debug | bool
    - ansible_verbosity >= 1
  tags:
    - always

# Optional: Gather enhanced facts via REST API with depth=2
# This provides IPv6 addresses (actual values) and VSX virtual IPs
- name: Include enhanced fact gathering
  ansible.builtin.include_tasks:
    file: gather_enhanced_facts.yml
  when:
    - aoscx_gather_enhanced_facts | default(false) | bool
  tags:
    - always
