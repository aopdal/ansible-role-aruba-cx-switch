---
# Configure VXLAN on AOS-CX switches
#
# This task configures VXLAN (VNIs and VLAN-to-VNI mapping) for VLANs that are:
# 1. Available on the device (from NetBox)
# 2. In use on interfaces (access or tagged)
# 3. Have L2VPN termination defined in NetBox
# 4. Not already configured for VXLAN (idempotent check)
#
# Prerequisites: identify_vlan_changes.yml must run first to set:
# - vlans: VLANs available from NetBox
# - vlans_in_use: VLANs currently in use on interfaces
#
# Custom field required: device_vxlan (boolean)
# VLAN field required: l2vpn_termination.l2vpn.identifier (VNI)
#
# Configuration order:
# 1. Create VNI under interface vxlan 1
# 2. Assign VLAN to VNI

- name: Verify VLAN analysis has been performed
  ansible.builtin.assert:
    that:
      - vlans is defined
      - vlans_in_use is defined
    fail_msg: "ERROR: identify_vlan_changes.yml must run before configure_vxlan.yml"
    success_msg: "VLAN analysis completed - proceeding with VXLAN configuration"
  when: custom_fields.device_vxlan | default(false) | bool

- name: Gather current VXLAN VNI configuration from device
  arubanetworks.aoscx.aoscx_command:
    commands:
      - show evpn evi
  register: vxlan_config_output
  vars:
    ansible_connection: network_cli
  when:
    - custom_fields.device_vxlan | default(false) | bool
  changed_when: false
  failed_when: false

- name: Debug - Raw VXLAN output from device
  ansible.builtin.debug:
    msg:
      - "=== Raw output from 'show evpn evi' ==="
      - "Output type: {{ vxlan_config_output.stdout | type_debug }}"
      - "Output length: {{ vxlan_config_output.stdout | length }}"
      - "First 500 chars: {{ vxlan_config_output.stdout[0][:500] if vxlan_config_output.stdout is defined and vxlan_config_output.stdout | length > 0 else 'No output' }}"
  when:
    - aoscx_debug_mode | default(false) | bool
    - custom_fields.device_vxlan | default(false) | bool
    - vxlan_config_output is defined

- name: Parse VXLAN configuration from device output using custom filter
  ansible.builtin.set_fact:
    vxlan_parsed: >-
      {{
        vxlan_config_output.stdout[0] | parse_evpn_evi_output
        if vxlan_config_output.stdout is defined and vxlan_config_output.stdout | length > 0
        else {'vxlan_mappings': [], 'vxlan_vnis': [], 'vxlan_vlans': []}
      }}
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - vxlan_config_output is defined
    - vxlan_config_output.stdout is defined

- name: Debug - Parsed VXLAN output
  ansible.builtin.debug:
    msg:
      - "Parsed VNIs: {{ vxlan_parsed.vxlan_vnis }}"
      - "Parsed VLANs: {{ vxlan_parsed.vxlan_vlans }}"
      - "Parsed Mappings: {{ vxlan_parsed.vxlan_mappings }}"
      - "Count: {{ vxlan_parsed.vxlan_vlans | length }}"
  when:
    - aoscx_debug_mode | default(false) | bool
    - custom_fields.device_vxlan | default(false) | bool
    - vxlan_parsed is defined

- name: Extract existing VNIs and VLANs from parsed output
  ansible.builtin.set_fact:
    existing_vxlan_mappings: "{{ vxlan_parsed.vxlan_mappings }}"
    existing_vxlan_vnis: "{{ vxlan_parsed.vxlan_vnis }}"
    existing_vxlan_vlans: "{{ vxlan_parsed.vxlan_vlans }}"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - vxlan_parsed is defined

- name: Debug - VLANs in use for VXLAN configuration
  ansible.builtin.debug:
    msg:
      - "=== VXLAN Configuration (configure_vxlan.yml) ==="
      - "Device: {{ inventory_hostname }}"
      - "VXLAN Enabled: {{ custom_fields.device_vxlan | default(false) }}"
      - "VLANs in use: {{ vlans_in_use.vids | default([]) | length }} - {{ vlans_in_use.vids | default([]) | sort }}"
      - "VLANs available: {{ vlans | default([]) | length }}"
  when: aoscx_debug_mode | default(false) | bool

- name: Filter VLANs that need VXLAN configuration
  ansible.builtin.set_fact:
    vlans_for_vxlan: "{{ vlans | default([]) |
      selectattr('vid', 'in', vlans_in_use.vids | default([])) |
      selectattr('l2vpn_termination', 'defined') |
      selectattr('l2vpn_termination.id', 'defined') |
      rejectattr('vid', 'in', existing_vxlan_vlans | default([])) |
      list }}"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - vlans is defined
    - vlans_in_use is defined

- name: Debug - VLANs filtered for VXLAN
  ansible.builtin.debug:
    msg:
      - "VLANs already configured with VXLAN: {{ existing_vxlan_vlans | default([]) | length }} - {{ existing_vxlan_vlans | default([]) | sort }}"
      - "VNIs already configured: {{ existing_vxlan_vnis | default([]) | length }} - {{ existing_vxlan_vnis | default([]) | sort }}"
      - "VLANs needing VXLAN config: {{ vlans_for_vxlan | default([]) | length }}"
      - "VLAN IDs to configure: {{ vlans_for_vxlan | default([]) | map(attribute='vid') | list | sort }}"
      - "VNIs to configure: {{ vlans_for_vxlan | default([]) | map(attribute='l2vpn_termination.l2vpn.identifier') | list | sort }}"
  when:
    - aoscx_debug_mode | default(false) | bool
    - vlans_for_vxlan is defined

# ============================================================================
# Step 1: Create VNI under interface vxlan 1 (only new ones)
# ============================================================================

- name: Create VNI on VXLAN interface
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface vxlan 1
    lines:
      - vni {{ item.l2vpn_termination.l2vpn.identifier }}
    match: line
  loop: "{{ vlans_for_vxlan | default([]) }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} VNI: {{ item.l2vpn_termination.l2vpn.identifier }} (VLAN {{ item.vid }})"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - vlans_for_vxlan is defined
    - vlans_for_vxlan | length > 0
  vars:
    ansible_connection: network_cli

# ============================================================================
# Step 2: Assign VLAN to VNI (VLAN-to-VNI mapping) (only new ones)
# ============================================================================

- name: Assign VLAN to VNI on VXLAN interface
  arubanetworks.aoscx.aoscx_config:
    parents:
      - interface vxlan 1
      - vni {{ item.l2vpn_termination.l2vpn.identifier }}
    lines:
      - vlan {{ item.vid }}
    match: line
  loop: "{{ vlans_for_vxlan | default([]) }}"
  loop_control:
    label: "Device: {{ inventory_hostname }} VNI {{ item.l2vpn_termination.l2vpn.identifier }} → VLAN {{ item.vid }}"
  when:
    - custom_fields.device_vxlan | default(false) | bool
    - vlans_for_vxlan is defined
    - vlans_for_vxlan | length > 0
  vars:
    ansible_connection: network_cli

- name: Display VXLAN configuration summary
  ansible.builtin.debug:
    msg:
      - "=== VXLAN Configuration Summary ==="
      - "Device: {{ inventory_hostname }}"
      - "VXLAN VLANs already configured: {{ existing_vxlan_vlans | default([]) | length }}"
      - "VXLAN VLANs newly configured: {{ vlans_for_vxlan | default([]) | length }}"
      - "Newly configured VLAN-to-VNI mappings:"
      - "{% for vlan in vlans_for_vxlan | default([]) %}  VLAN {{ vlan.vid }} → VNI {{ vlan.l2vpn_termination.l2vpn.identifier }}{% endfor %}"
  when:
    - aoscx_debug_mode | default(false) | bool
    - custom_fields.device_vxlan | default(false) | bool
    - vlans_for_vxlan is defined
