# code: language=ansible
---
# Hostname configuration for Aruba CX switches

- name: configure_hostname | Display hostname configuration debug info
  ansible.builtin.debug:
    msg:
      - "Configuring hostname on {{ inventory_hostname }}"
  when: aoscx_debug | bool or ansible_verbosity >= 1

- name: configure_hostname | Configure hostname
  arubanetworks.aoscx.aoscx_config:
    lines:
      - "hostname {{ inventory_hostname }}"
  vars:
    ansible_connection: network_cli
