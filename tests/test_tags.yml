---
# Quick test for base config tags
- name: Test Base Config Tags
  hosts: localhost
  gather_facts: false
  vars:
    # Test configuration - flattened (simulating NetBox inventory with plurals: true)
    motd: "Test banner message"
    timezone: "europe/oslo"
    ntp_vrf: "mgmt"
    ntp_servers:
      - server: "pool.ntp.org"

    aoscx_configure_banner: true
    aoscx_configure_timezone: true
    aoscx_configure_ntp: true
    aoscx_configure_dns: false
    aoscx_debug: true

  tasks:
    - name: Show what variables are available
      ansible.builtin.debug:
        msg:
          - "motd: {{ motd | default('NOT DEFINED') }}"
          - "timezone: {{ timezone | default('NOT DEFINED') }}"
          - "ntp_vrf: {{ ntp_vrf | default('NOT DEFINED') }}"

    - name: Include banner configuration (with proper tag inheritance)
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../tasks/configure_banner.yml"
        apply:
          tags:
            - banner
            - base_config
      when: aoscx_configure_banner | bool
      tags:
        - always
