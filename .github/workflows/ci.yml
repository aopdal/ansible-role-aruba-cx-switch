---
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ansible-version:
          - '2.14'
          - '2.15'
          - '2.16'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core~=${{ matrix.ansible-version }}.0"

      - name: Install role dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-playbook syntax check
        run: |
          ansible-playbook tests/test.yml -i tests/inventory --syntax-check

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - ubuntu2204
          - ubuntu2004
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Install role dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule tests
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Install role dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run integration tests
        run: |
          cd tests
          ansible-playbook test.yml -i inventory -vv

  release:
    name: Release to Ansible Galaxy
    runs-on: ubuntu-latest
    needs: [lint, syntax, molecule, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Trigger a new import on Ansible Galaxy
        run: >-
          ansible-galaxy role import
          --api-key ${{ secrets.GALAXY_API_KEY }}
          $(echo ${{ github.repository }} | cut -d/ -f1)
          $(echo ${{ github.repository }} | cut -d/ -f2)
