---
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python 3.x
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run yamllint
        run: yamllint --strict .

      - name: Run ansible-lint
        run: ansible-lint

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python 3.x
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core~=2.19.10"

      - name: Install role dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-playbook syntax check
        run: |
          ansible-playbook tests/test.yml -i tests/inventory --syntax-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python 3.x
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=filter_plugins --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    needs: [lint, syntax, unit-tests]
    strategy:
      matrix:
        distro:
          - ubuntu2204
          - ubuntu2404
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python 3.x
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Install role dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule tests
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}

