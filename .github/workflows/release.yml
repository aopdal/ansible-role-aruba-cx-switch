---
name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

jobs:
  # Run tests before releasing
  test:
    name: Run Tests
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Current VERSION file: ${version}"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} does not exist — proceeding with release"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          python3 << 'PYEOF'
          import re
          from pathlib import Path

          version = "${{ steps.version.outputs.version }}"
          changelog = Path("CHANGELOG.md").read_text()

          # Extract content between this version header and the next version header
          pattern = rf"## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|$)"
          match = re.search(pattern, changelog, re.DOTALL)

          if match:
              notes = match.group(1).strip()
          else:
              notes = f"Release {version}"

          Path("RELEASE_NOTES.md").write_text(f"# Release {version}\n\n{notes}\n")
          print(f"Extracted release notes ({len(notes)} chars)")
          PYEOF

      - name: Create Git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release version ${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

      - name: Summary
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Notes" >> $GITHUB_STEP_SUMMARY
          cat RELEASE_NOTES.md >> $GITHUB_STEP_SUMMARY
